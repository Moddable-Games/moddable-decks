<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mongo — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>html,body{margin:0;padding:0;background:#f5f4ef;} body{font-family:var(--mg-font-body);color:var(--mg-ink);} *{box-sizing:border-box;} em{font-style:italic;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <div data-screen-label="Game · mongo">
      <NavBar />
      <section style={{ position: "relative", color: "#fff", overflow: "hidden", background: "#000", padding: "56px 32px 96px" }}>
        <div style={{ position: "absolute", right: -150, top: "30%", width: 700, height: 700, background: "radial-gradient(circle, #3a992855 0%, transparent 60%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 960, margin: "0 auto", position: "relative" }}>
          <a href="../games/index.html" style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "rgba(255,255,255,0.7)", textDecoration: "none" }}>← All games</a>
          <div style={{ display: "flex", gap: 10, marginTop: 24, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 11, background: "#3a9928", color: "#fff", padding: "4px 10px", borderRadius: 9999, letterSpacing: "0.3px" }}>Original</span>
            <span style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#e89a1a", padding: "5px 10px", letterSpacing: "1px" }}>⚠ STUB PAGE</span>
          </div>
          <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(48px, 7vw, 96px)", lineHeight: 0.95, letterSpacing: "-0.025em", margin: "20px 0 24px" }}>Mongo.</h1>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, lineHeight: 1.55, color: "rgba(255,255,255,0.78)", maxWidth: 600, margin: "0 0 32px" }}>
            Full game page coming. The complete template — hero, how-it-plays, mod hooks, community mods — is implemented for <a href="../game-detail/index.html" style={{ color: "#6fb5ff" }}>Endless Skies</a>. Claude Code can scaffold this page from that template plus this game's registry entry.
          </p>
          <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 13, color: "rgba(255,255,255,0.7)", paddingTop: 20, borderTop: "1px solid rgba(255,255,255,0.12)" }}>3–5 players · 30 min · 12+</div>
        </div>
      </section>
      <section style={{ background: "#f5f4ef", padding: "56px 32px 96px" }}>
        <div style={{ maxWidth: 760, margin: "0 auto", textAlign: "center" }}>
          <Btn variant="dark" onClick={() => location.href = "../game-detail/index.html"}>See the full template (Endless Skies)</Btn>
        </div>
      </section>
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
