<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>About — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>
<script type="text/babel" src="PageHero.jsx"></script>

<script type="text/babel">

function AboutBody() {
  return (
    <Prose>
      <ProseP><em>Moddable.Games</em> is a workshop publishing open-source rulebook mods for the board games already on your shelf — and three original games designed to be modded from day one.</ProseP>

      <ProseTitle>The premise.</ProseTitle>
      <ProseP>Tabletop publishing is conservative. Rules are copyrighted, artwork owned, trademarks defended — for understandable reasons. But that defensive crouch leaves a lot on the table. Half the fun of a game is the way your group plays it, not the way the publisher intended.</ProseP>
      <ProseP>We do two things. We write rules patches you can run with the components in the box you already own — no expansions to buy, no replacement parts to print, just a PDF and a flat surface. And we design original games whose entire rulebook is in a git repo so anyone can fork it.</ProseP>

      <ProseTitle>What we don't do.</ProseTitle>
      <ProseP>We don't sell boards. We don't run a Kickstarter. We don't manufacture meeples. The whole operation is digital — the only physical thing we make is the conversation around your kitchen table.</ProseP>

      <ProseTitle>Where to find us.</ProseTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, margin: "20px 0 40px" }}>
        <a href="../community/index.html" style={{ display: "flex", alignItems: "center", gap: 12, padding: 18, background: "#fff", border: "1px solid #e6e3d8", borderRadius: 14, textDecoration: "none", color: "inherit" }}>
          <div style={{ width: 32, height: 32, background: "#5865f2", borderRadius: 8, flex: "none" }} />
          <div>
            <div style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 15 }}>Discord</div>
            <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#7a8290" }}>2,400+ members</div>
          </div>
        </a>
        <a href="../team/index.html" style={{ display: "flex", alignItems: "center", gap: 12, padding: 18, background: "#fff", border: "1px solid #e6e3d8", borderRadius: 14, textDecoration: "none", color: "inherit" }}>
          <div style={{ width: 32, height: 32, background: "#0c4f8d", borderRadius: 8, flex: "none" }} />
          <div>
            <div style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 15 }}>Team</div>
            <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#7a8290" }}>Six humans, no AI</div>
          </div>
        </a>
      </div>
    </Prose>
  );
}

function App() {
  return (
    <div data-screen-label="About">
      <NavBar />
      <PageHero eyebrow="▲ ABOUT MODDABLE" title="Creating games you already own." lede="A workshop of designers, modders and rule-tinkerers reshaping the boards already on your shelf." withHorizon />
      <AboutBody />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
