<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Endless Skies — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #000; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/ModCard.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>

<script type="text/babel">

// =============================================================================
// Endless Skies — an original Moddable.Games title.
// Demonstrates the game-detail surface: hero with imagery, what-it-is, hooks
// the modders can attach to, related mods (community contributions), download.
// =============================================================================

function GameHero() {
  return (
    <section style={{ position: "relative", color: "#fff", overflow: "hidden", isolation: "isolate", background: "#000", minHeight: 620 }}>
      {/* Brand backdrop */}
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage: "url('../../assets/hex-horizon.jpg')",
        backgroundSize: "cover",
        backgroundPosition: "center 80%",
      }} />
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(8,10,30,0.3) 40%, transparent 60%)" }} />
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.5) 85%, #000 100%)" }} />

      <div style={{ position: "relative", padding: "64px 32px 100px" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          <a href="../marketing/index.html" style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "rgba(255,255,255,0.72)", textDecoration: "none" }}>← All games</a>

          <div style={{ display: "flex", gap: 10, marginTop: 28, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 11, background: "#3a9928", color: "#fff", padding: "4px 10px", borderRadius: 9999 }}>Original</span>
            <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "rgba(255,255,255,0.7)", padding: "4px 10px", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 9999 }}>CC BY-NC-SA · Print-and-play</span>
            <span style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#6fb5ff", padding: "5px 10px", letterSpacing: "1px", textShadow: "0 0 8px rgba(111,181,255,0.5)" }}>v1.3.0</span>
          </div>

          <h1 style={{
            fontFamily: "var(--mg-font-display)",
            fontWeight: 600,
            fontSize: "clamp(56px, 8vw, 124px)",
            lineHeight: 0.95,
            letterSpacing: "-0.03em",
            margin: "24px 0 24px",
            textShadow: "0 4px 30px rgba(0,0,0,0.6)",
          }}>
            Endless<br/>Skies.
          </h1>

          <p style={{
            fontFamily: "var(--mg-font-body)",
            fontSize: 19,
            lineHeight: 1.55,
            color: "rgba(255,255,255,0.86)",
            maxWidth: 640,
            margin: "0 0 36px",
            textShadow: "0 2px 16px rgba(0,0,0,0.7)",
          }}>
            A hex-tile exploration game built to be modded. Three biomes, twelve faction decks, one rulebook with version control —
            so the community can ship expansions without asking permission.
          </p>

          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <Btn variant="primary">Download Print-and-Play</Btn>
            <Btn variant="outline-dark">Browse community mods</Btn>
          </div>
        </div>
      </div>
    </section>
  );
}

function StatsBar() {
  const stats = [
    ["Players", "2–4"], ["Time", "60–90 min"], ["Age", "12+"],
    ["Designer", "Moddable team"], ["Released", "Mar 2025"], ["Mods", "8 community"],
  ];
  return (
    <section style={{ background: "#000", color: "#fff", padding: "0 32px 56px" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", gap: 28, alignItems: "center", flexWrap: "wrap", paddingTop: 28, borderTop: "1px solid rgba(255,255,255,0.12)" }}>
        {stats.map(([k, v], i) => (
          <React.Fragment key={k}>
            {i > 0 && <span style={{ width: 1, height: 24, background: "rgba(255,255,255,0.12)" }} />}
            <div style={{ display: "flex", flexDirection: "column" }}>
              <span style={{ fontFamily: "var(--mg-font-body)", fontSize: 10, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", letterSpacing: "1px" }}>{k}</span>
              <span style={{ fontFamily: "var(--mg-font-mono)", fontWeight: 600, fontSize: 16, color: "#fff", marginTop: 4 }}>{v}</span>
            </div>
          </React.Fragment>
        ))}
      </div>
    </section>
  );
}

function HowItWorks() {
  const steps = [
    { n: "01", title: "Lay the world",   body: "Six players or fewer. 19 hex tiles dealt face-down into a 3-ring spiral. No two games start the same." },
    { n: "02", title: "Pick a faction",   body: "Twelve faction decks ship in the base set: Cartographers, Storm-callers, Salvagers, Iron Banks… each with one rule that breaks one rule of the base game." },
    { n: "03", title: "Trade and tile",   body: "Flip a tile to reveal a biome (sky, sea, surface). Trade resources at the open table — the speaker can veto one deal per round." },
    { n: "04", title: "End in the void",  body: "Whoever reaches the centre tile (the Void) first triggers the endgame. Two more full rounds, then count points. Tied games go to the Storm-caller." },
  ];
  return (
    <section style={{ background: "#f5f4ef", padding: "88px 32px" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>
        <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(36px, 4.5vw, 56px)", lineHeight: 1.05, letterSpacing: "-0.025em", color: "#14161c", margin: "0 0 48px" }}>
          How it plays.
        </h2>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
          {steps.map(s => (
            <article key={s.n} style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 16, padding: 24 }}>
              <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 11, color: "#3a9928", letterSpacing: "1.5px", marginBottom: 14 }}>▲ {s.n}</div>
              <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 22, lineHeight: 1.2, letterSpacing: "-0.25px", color: "#14161c", margin: "0 0 10px" }}>{s.title}</h3>
              <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 14, lineHeight: 1.55, color: "#3a3d44", margin: 0 }}>{s.body}</p>
            </article>
          ))}
        </div>
      </div>
    </section>
  );
}

function ModHooks() {
  const hooks = [
    { name: "factions.yaml",  desc: "Add a faction deck with one rule-breaker line. Validates against the base ruleset." },
    { name: "biomes.yaml",    desc: "Define new tile biomes — terrain, resources, victory contribution." },
    { name: "endgame.lua",    desc: "Override how the endgame is triggered. Useful for short-game variants." },
    { name: "rules.md",       desc: "Your version of the rulebook. Diffs are reviewed by the maintainers." },
  ];
  return (
    <section style={{ background: "#000", color: "#fff", padding: "88px 32px", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", left: -100, top: "30%", width: 500, height: 500, background: "radial-gradient(circle, rgba(58,123,232,0.18) 0%, transparent 65%)", pointerEvents: "none" }} />
      <div style={{ maxWidth: 1200, margin: "0 auto", position: "relative" }}>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 10, color: "#6fb5ff", letterSpacing: "1.5px", marginBottom: 18 }}>▲ MOD HOOKS</div>
        <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(36px, 4.5vw, 56px)", lineHeight: 1.05, letterSpacing: "-0.025em", margin: "0 0 16px", maxWidth: 800 }}>
          The whole rulebook is in a git repo.
        </h2>
        <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, lineHeight: 1.6, color: "rgba(255,255,255,0.78)", margin: "0 0 48px", maxWidth: 700 }}>
          Endless Skies ships with four hookable files. Fork the repo, change the file, send us a PR — or run your variant privately and never tell us.
        </p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 14 }}>
          {hooks.map(h => (
            <div key={h.name} style={{
              background: "#161721",
              border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: 16,
              padding: 24,
              display: "flex",
              gap: 18,
              alignItems: "flex-start",
            }}>
              <div style={{ width: 40, height: 40, background: "#0c4f8d", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}>
                <img src="../../assets/icons/mod.svg" width="20" height="20" alt="" style={{ filter: "invert(1)" }} />
              </div>
              <div>
                <div style={{ fontFamily: "var(--mg-font-mono)", fontWeight: 600, fontSize: 15, color: "#6fb5ff" }}>{h.name}</div>
                <div style={{ fontFamily: "var(--mg-font-body)", fontSize: 14, color: "rgba(255,255,255,0.78)", lineHeight: 1.5, marginTop: 6 }}>{h.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function CommunityMods() {
  const items = [
    { category: "Reskin",     baseGame: "Endless Skies", title: "Endless Skies: Inkwell",  body: "All-monochrome tile set. Every faction recoloured into Edo-period woodblock palette.", stats: "2–4 players · 90 min · 12+" },
    { category: "Rebalance",  baseGame: "Endless Skies", title: "Solo Skies",              body: "A solo-mode bot using a 32-card AI deck. Three difficulty tiers.", stats: "1 player · 60 min · 14+" },
    { category: "Total conversion", baseGame: "Endless Skies", title: "Subterranean", body: "Same engine, underground theme. The Void becomes the Magma Heart. Hex tiles flipped sides.", stats: "2–4 players · 90 min · 12+" },
  ];
  return (
    <section style={{ background: "#fff", padding: "88px 32px", borderTop: "1px solid #e6e3d8" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16, marginBottom: 32 }}>
          <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(36px, 4.5vw, 56px)", lineHeight: 1.05, letterSpacing: "-0.025em", color: "#14161c", margin: 0 }}>
            Community mods for <em>Endless Skies</em>.
          </h2>
          <a href="../submit/index.html" style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 14, color: "#0c4f8d", textDecoration: "none" }}>Submit yours →</a>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
          {items.map(m => <ModCard key={m.title} {...m} />)}
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <div data-screen-label="Game Detail · Endless Skies">
      <NavBar activeSection="Games" />
      <GameHero />
      <StatsBar />
      <HowItWorks />
      <ModHooks />
      <CommunityMods />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
