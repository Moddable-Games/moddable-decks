<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Web3 — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>
<script type="text/babel" src="../about/PageHero.jsx"></script>

<script type="text/babel">

function Position({ title, body, position }) {
  const colors = { for: "#3a9928", against: "#d11a1a", curious: "#0c4f8d" };
  const labels = { for: "FOR", against: "AGAINST", curious: "CURIOUS" };
  return (
    <article style={{ background: "#fff", border: `1px solid #e6e3d8`, borderRadius: 16, padding: 24 }}>
      <div style={{ display: "inline-block", fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#fff", background: colors[position], padding: "4px 10px", borderRadius: 9999, letterSpacing: "1px", marginBottom: 14 }}>{labels[position]}</div>
      <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 22, lineHeight: 1.2, letterSpacing: "-0.25px", color: "#14161c", margin: "0 0 12px" }}>{title}</h3>
      <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 15, lineHeight: 1.6, color: "#3a3d44", margin: 0 }}>{body}</p>
    </article>
  );
}

function Web3Body() {
  return (
    <Prose>
      <ProseP><em>Tabletop on a blockchain.</em> The phrase makes most people in our Discord either laugh or wince — sometimes simultaneously. We thought we'd put our position on the page, openly.</ProseP>

      <ProseTitle>Where we stand.</ProseTitle>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, margin: "16px 0 32px" }}>
        <Position position="for"     title="On-chain rulebook hashes" body="Every mod we publish is hash-signed onto a public ledger. So a forked rulebook can always be traced back to the original — no contracts required, no platform lock-in." />
        <Position position="curious" title="Distributed playtesting"   body="Could playtest data — outcomes, balance, abuse cases — be aggregated trustlessly across thousands of sessions? Maybe. We're listening." />
        <Position position="against" title="NFTs of board components"  body="No. Hard pass. Trading-card-game tokens, character cards, and 'limited edition' meeples sold as collectibles are not what we're here for." />
      </div>

      <ProseTitle>The principle.</ProseTitle>
      <ProseP>If a Web3 tool helps a community of modders verify whose ruleset is whose, or aggregate playtest data without sharing it with a megacorp, we're interested. If it's a vehicle for selling speculative tokens of dice — we're not.</ProseP>

      <ProseTitle>What we shipped.</ProseTitle>
      <ProseP>One thing, so far. Every rulebook PDF in our library has a SHA-256 hash stamped into its footer. The hash table itself lives in a public repo. You can verify your downloaded copy hasn't been tampered with — and so can anyone forking it.</ProseP>

      <div style={{ background: "#000", color: "#fff", padding: 24, borderRadius: 16, marginTop: 24 }}>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#6fb5ff", letterSpacing: "1.5px", marginBottom: 10 }}>▲ VERIFY A RULEBOOK</div>
        <code style={{ fontFamily: "var(--mg-font-mono)", fontSize: 13, color: "#fff", background: "transparent", padding: 0, display: "block", lineHeight: 1.6 }}>
          $ shasum -a 256 talisman-hexed-v1.0.0.pdf<br />
          a3f2c8e1d4b7a9f5e6c2d8b1a4f7c9e3...
        </code>
      </div>
    </Prose>
  );
}

function App() {
  return (
    <div data-screen-label="Web3">
      <NavBar />
      <PageHero eyebrow="▲ WEB3" title="Tabletop, on a chain?" lede="Our position on the question we get most often — answered honestly." accent="#5d2a8a" />
      <Web3Body />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
