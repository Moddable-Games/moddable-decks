<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Submit a mod — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  input, textarea, select { font-family: inherit; }
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>

<script type="text/babel">

const FIELD_BASE = {
  width: "100%",
  padding: "14px 16px",
  border: "1px solid #e6e3d8",
  borderRadius: 12,
  fontFamily: "var(--mg-font-body)",
  fontSize: 16,
  color: "#14161c",
  background: "#fff",
  outline: "none",
  transition: "border-color 150ms",
};

function Field({ label, hint, required, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <label style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 14, color: "#14161c", letterSpacing: "0.1px" }}>
        {label}{required && <span style={{ color: "#d11a1a", marginLeft: 4 }}>*</span>}
      </label>
      {hint && <span style={{ fontFamily: "var(--mg-font-body)", fontSize: 13, color: "#4f5764" }}>{hint}</span>}
      {children}
    </div>
  );
}

function CategoryPicker({ value, onChange }) {
  const opts = [
    { v: "Reskin", c: "#0c4f8d", desc: "Same rules, new theme or board layout." },
    { v: "Rebalance", c: "#3a9928", desc: "Same theme, tuned rules — pacing, fairness, length." },
    { v: "Total conversion", c: "#d11a1a", desc: "New rules, new theme, components only." },
  ];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
      {opts.map(o => {
        const active = value === o.v;
        return (
          <button key={o.v} type="button" onClick={() => onChange(o.v)} style={{
            background: active ? o.c : "#fff",
            color: active ? "#fff" : "#14161c",
            border: `2px solid ${active ? o.c : "#e6e3d8"}`,
            borderRadius: 14,
            padding: 16,
            textAlign: "left",
            cursor: "pointer",
            transition: "all 150ms cubic-bezier(.2,.8,.2,1)",
            display: "flex", flexDirection: "column", gap: 6,
          }}>
            <span style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 17, letterSpacing: "-0.2px" }}>{o.v}</span>
            <span style={{ fontFamily: "var(--mg-font-body)", fontSize: 12, color: active ? "rgba(255,255,255,0.86)" : "#4f5764", lineHeight: 1.4 }}>{o.desc}</span>
          </button>
        );
      })}
    </div>
  );
}

function FileDrop({ label, accept, fileName, onPick }) {
  const inputRef = React.useRef(null);
  return (
    <div
      onClick={() => inputRef.current?.click()}
      style={{
        border: "2px dashed #c3c5cc",
        borderRadius: 14,
        padding: 24,
        textAlign: "center",
        cursor: "pointer",
        background: "#fff",
        transition: "border-color 150ms",
      }}
      onDragOver={(e) => { e.preventDefault(); e.currentTarget.style.borderColor = "#0c4f8d"; }}
      onDragLeave={(e) => { e.currentTarget.style.borderColor = "#c3c5cc"; }}
    >
      <input ref={inputRef} type="file" accept={accept} hidden onChange={(e) => onPick(e.target.files?.[0]?.name)} />
      <img src="../../assets/icons/download.svg" width="20" height="20" alt="" style={{ transform: "rotate(180deg)", color: "#0c4f8d", marginBottom: 8 }} />
      <div style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 14, color: "#14161c" }}>
        {fileName || `Drop ${label} here or click to upload`}
      </div>
      {!fileName && <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "#7a8290", marginTop: 4 }}>{accept}</div>}
    </div>
  );
}

function SubmitForm() {
  const [data, setData] = React.useState({
    name: "", base: "", category: "Reskin",
    pitch: "", details: "", players: "", time: "", age: "",
    rules: "", art: "", submitted: false,
  });
  const set = (k) => (v) => setData(d => ({ ...d, [k]: v }));

  if (data.submitted) {
    return (
      <div style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 20, padding: 64, textAlign: "center" }}>
        <div style={{ width: 64, height: 64, background: "#3a9928", borderRadius: 16, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 24 }}>
          <img src="../../assets/icons/check.svg" width="32" height="32" alt="" style={{ filter: "invert(1)" }} />
        </div>
        <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 40, lineHeight: 1.1, letterSpacing: "-0.5px", color: "#14161c", margin: "0 0 12px" }}>
          Submission received.
        </h2>
        <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, color: "#3a3d44", margin: "0 0 24px", lineHeight: 1.55 }}>
          Thanks for the pitch. We'll read it within a week and reply on the Discord thread you're tagged into.
        </p>
        <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 13, color: "#7a8290", padding: "12px 18px", background: "#f5f4ef", borderRadius: 9999, display: "inline-block" }}>
          Submission ID: MG-{Math.floor(Math.random()*9000+1000)}
        </div>
      </div>
    );
  }

  return (
    <form onSubmit={(e) => { e.preventDefault(); set("submitted")(true); }} style={{ display: "flex", flexDirection: "column", gap: 40 }}>

      {/* Step 1 */}
      <section style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 20, padding: 32 }}>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#0c4f8d", letterSpacing: "1.5px", marginBottom: 6 }}>▲ STEP 01</div>
        <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 28, color: "#14161c", margin: "0 0 24px", letterSpacing: "-0.3px" }}>The basics.</h3>

        <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
          <Field label="Mod name" required>
            <input style={FIELD_BASE} placeholder="e.g. Talisman: Hexed" value={data.name} onChange={(e) => set("name")(e.target.value)} />
          </Field>
          <Field label="Base game" hint="The game your mod modifies. If you're submitting an original, leave blank." required>
            <input style={FIELD_BASE} placeholder="e.g. Talisman 4e (revised)" value={data.base} onChange={(e) => set("base")(e.target.value)} />
          </Field>
          <Field label="Mod category" required hint="Pick one. We'll colour-code your mod card in the library.">
            <CategoryPicker value={data.category} onChange={set("category")} />
          </Field>
        </div>
      </section>

      {/* Step 2 */}
      <section style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 20, padding: 32 }}>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#3a9928", letterSpacing: "1.5px", marginBottom: 6 }}>▲ STEP 02</div>
        <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 28, color: "#14161c", margin: "0 0 24px", letterSpacing: "-0.3px" }}>The pitch.</h3>

        <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
          <Field label="One-line pitch" hint="120 characters max. The hook that sells the mod." required>
            <input maxLength={120} style={FIELD_BASE} placeholder="e.g. Open-world hex tiles for Talisman — every game lays out differently." value={data.pitch} onChange={(e) => set("pitch")(e.target.value)} />
          </Field>
          <Field label="What the mod does" hint="A paragraph or two. What changes, what stays, why you built it." required>
            <textarea style={{ ...FIELD_BASE, minHeight: 140, resize: "vertical", lineHeight: 1.55 }} value={data.details} onChange={(e) => set("details")(e.target.value)} />
          </Field>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
            <Field label="Players">
              <input style={FIELD_BASE} placeholder="3–5" value={data.players} onChange={(e) => set("players")(e.target.value)} />
            </Field>
            <Field label="Time">
              <input style={FIELD_BASE} placeholder="60 min" value={data.time} onChange={(e) => set("time")(e.target.value)} />
            </Field>
            <Field label="Age">
              <input style={FIELD_BASE} placeholder="12+" value={data.age} onChange={(e) => set("age")(e.target.value)} />
            </Field>
          </div>
        </div>
      </section>

      {/* Step 3 */}
      <section style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 20, padding: 32 }}>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#d11a1a", letterSpacing: "1.5px", marginBottom: 6 }}>▲ STEP 03</div>
        <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 28, color: "#14161c", margin: "0 0 24px", letterSpacing: "-0.3px" }}>The materials.</h3>

        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <Field label="Rulebook PDF" hint="Max 10 MB. We'll typeset a clean version with you before publishing." required>
            <FileDrop label="your rulebook" accept=".pdf" fileName={data.rules} onPick={set("rules")} />
          </Field>
          <Field label="Optional artwork or component art" hint="PNG, JPG, SVG. Drop multiple if you have them.">
            <FileDrop label="artwork" accept=".png,.jpg,.jpeg,.svg" fileName={data.art} onPick={set("art")} />
          </Field>
        </div>
      </section>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
        <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 13, color: "#4f5764", maxWidth: 480, margin: 0, lineHeight: 1.5 }}>
          By submitting, you agree your mod is original work and will be published under a Creative Commons BY-NC-SA licence.
        </p>
        <Btn type="submit" variant="dark">Submit for review</Btn>
      </div>
    </form>
  );
}

function App() {
  return (
    <div data-screen-label="Submit a mod">
      <NavBar activeSection="Mods" />

      <section style={{ background: "#000", color: "#fff", padding: "56px 32px 72px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", right: -150, top: 0, width: 600, height: 500, background: "radial-gradient(circle, rgba(58,123,232,0.22) 0%, transparent 65%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 760, margin: "0 auto", position: "relative" }}>
          <a href="../marketing/index.html" style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "rgba(255,255,255,0.7)", textDecoration: "none" }}>← Back to mods</a>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 10, color: "#6fb5ff", letterSpacing: "1.5px", marginTop: 18, marginBottom: 14 }}>▲ SUBMIT A MOD</div>
          <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(40px, 5.5vw, 72px)", lineHeight: 1.0, letterSpacing: "-0.025em", margin: 0 }}>
            Pitch your house rules.
          </h1>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, lineHeight: 1.55, color: "rgba(255,255,255,0.78)", margin: "16px 0 0", maxWidth: 580 }}>
            We publish open-source mods under a Creative Commons licence — your name on it, no contracts.
            Three steps. We'll get back to you within a week.
          </p>
        </div>
      </section>

      <section style={{ background: "#f5f4ef", padding: "48px 32px 96px" }}>
        <div style={{ maxWidth: 760, margin: "0 auto" }}>
          <SubmitForm />
        </div>
      </section>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
