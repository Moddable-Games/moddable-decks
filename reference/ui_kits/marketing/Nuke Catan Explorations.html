<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nuke Catan — Hero Treatments</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #1a1c20; height: 100%; }
  body { font-family: var(--mg-font-body); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Buttons.jsx"></script>
<script type="text/babel" src="NavBar.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

const IMG = "../../assets/illustrations/nuke-catan-family.png";

// =============================================================================
// A — "Direct" — image full-bleed center, kept exactly as provided
// Black canvas, image dominant, headline below. The image's own warm glow
// (orange/yellow mushroom + cloud) does all the atmospheric work.
// =============================================================================
function NukeA() {
  return (
    <div style={{ background: "#000", color: "#fff", minHeight: "100%" }}>
      <NavBar activeSection="Mods" />
      <section style={{ padding: "40px 24px 80px", textAlign: "center", position: "relative" }}>
        {/* Red ground glow */}
        <div style={{ position: "absolute", left: "50%", top: "62%", transform: "translateX(-50%)", width: 900, height: 350, background: "radial-gradient(ellipse, rgba(209,26,26,0.45) 0%, transparent 65%)", pointerEvents: "none", filter: "blur(20px)" }} />

        <div style={{ position: "relative", maxWidth: 760, margin: "0 auto" }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 11, color: "#e63232", letterSpacing: "2px", marginBottom: 24, textShadow: "0 0 14px rgba(230,50,50,0.6)" }}>▲ TOTAL CONVERSION · CATAN</div>
          <img src={IMG} alt="" style={{ maxWidth: 620, width: "100%", height: "auto", filter: "drop-shadow(0 30px 60px rgba(209,26,26,0.35))" }} />
        </div>

        <div style={{ position: "relative", marginTop: 0, maxWidth: 900, marginInline: "auto" }}>
          <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 96, lineHeight: 0.95, letterSpacing: "-2.5px", margin: "0 0 24px", textShadow: "0 4px 30px rgba(0,0,0,0.6)" }}>
            Are you ready<br/>to <em style={{ color: "#e63232" }}>nuke</em> Catan?
          </h1>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 18, lineHeight: 1.6, color: "rgba(255,255,255,0.78)", maxWidth: 540, margin: "0 auto 32px" }}>
            A post-apocalyptic rules overhaul. Sheep are scarce, brick is currency,
            and someone is going to set fire to the road network.
          </p>
          <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
            <Btn variant="red">Download the rules</Btn>
            <Btn variant="outline-dark">Read the brief</Btn>
          </div>
        </div>
      </section>
    </div>
  );
}

// =============================================================================
// B — "Split" — image right, text left, fiery red palette
// Asymmetric magazine-spread layout. Image is anchored to the right column,
// text to the left. Warm color treatment swaps the brand blue for Mod Red.
// =============================================================================
function NukeB() {
  return (
    <div style={{ background: "#0a0507", color: "#fff", minHeight: "100%" }}>
      <NavBar activeSection="Mods" />
      <section style={{ padding: "80px 32px 100px", position: "relative", overflow: "hidden" }}>
        {/* Warm radial */}
        <div style={{ position: "absolute", right: -100, top: "50%", transform: "translateY(-50%)", width: 800, height: 800, background: "radial-gradient(circle, rgba(209,26,26,0.32) 0%, rgba(232,154,26,0.18) 35%, transparent 65%)", pointerEvents: "none", filter: "blur(8px)" }} />

        <div style={{ maxWidth: 1200, margin: "0 auto", position: "relative", display: "grid", gridTemplateColumns: "1.05fr 1fr", gap: 48, alignItems: "center" }}>
          <div>
            <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 10, color: "#e89a1a", letterSpacing: "1.5px", marginBottom: 22, textShadow: "0 0 14px rgba(232,154,26,0.5)" }}>▲ ISSUE 014 · NUKE CATAN</div>
            <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 112, lineHeight: 0.95, letterSpacing: "-3px", margin: "0 0 24px" }}>
              Are you ready<br/>to <em style={{ color: "#e63232" }}>nuke</em><br/>Catan?
            </h1>
            <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 18, lineHeight: 1.6, color: "rgba(255,255,255,0.82)", maxWidth: 480, margin: "0 0 32px" }}>
              A family-friendly post-apocalyptic rules overhaul. Same tiles, same dice,
              new economy. Roads burn. Sheep extinct. Brick is currency now.
            </p>
            <div style={{ display: "flex", gap: 12, marginBottom: 32 }}>
              <Btn variant="red">Download the rules</Btn>
              <Btn variant="outline-dark">View the brief</Btn>
            </div>
            <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 13, color: "rgba(255,255,255,0.5)", letterSpacing: "0.5px", paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.12)" }}>
              3–5 players · 60 min · 12+ · v2.1.0 · uses Catan base set
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "center", filter: "drop-shadow(0 30px 80px rgba(209,26,26,0.4))" }}>
            <img src={IMG} alt="" style={{ width: "100%", maxWidth: 520, height: "auto" }} />
          </div>
        </div>
      </section>
    </div>
  );
}

// =============================================================================
// C — "Theatre" — cinematic crop, image as the entire hero
// Image scaled larger than the viewport, centered low. Heavy red+orange
// vignette top/bottom. Headline overlaid at the very top in pixel font.
// The boldest direction — leans hardest into the illustration.
// =============================================================================
function NukeC() {
  return (
    <div style={{ background: "#000", color: "#fff", minHeight: "100%" }}>
      <NavBar activeSection="Mods" />
      <section style={{ position: "relative", overflow: "hidden", minHeight: 720 }}>
        {/* Massive image, centred low */}
        <div style={{
          position: "absolute",
          bottom: -60,
          left: "50%",
          transform: "translateX(-50%)",
          width: 1100,
          height: 1100,
          backgroundImage: `url(${IMG})`,
          backgroundSize: "contain",
          backgroundRepeat: "no-repeat",
          backgroundPosition: "center",
          opacity: 0.96,
        }} />

        {/* Top atmosphere */}
        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(60,15,5,0.4) 30%, transparent 50%, transparent 70%, rgba(0,0,0,0.6) 100%)", pointerEvents: "none" }} />

        {/* Top label */}
        <div style={{ position: "relative", padding: "48px 24px", textAlign: "center", zIndex: 1 }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 12, color: "#e63232", letterSpacing: "3px", textShadow: "0 0 20px rgba(230,50,50,0.7)" }}>★ MOD OF THE MONTH ★</div>
        </div>

        {/* Headline floats over the cloud */}
        <div style={{ position: "absolute", top: 130, left: "50%", transform: "translateX(-50%)", textAlign: "center", zIndex: 2, width: "100%", padding: "0 24px" }}>
          <h1 style={{
            fontFamily: "var(--mg-font-pixel)",
            fontSize: 56,
            color: "#fff",
            lineHeight: 1.3,
            letterSpacing: "2px",
            margin: 0,
            textShadow: "0 4px 0 #000, 0 0 30px rgba(0,0,0,0.9), 0 0 60px rgba(230,50,50,0.6)",
          }}>
            NUKE CATAN
          </h1>
        </div>

        {/* CTA strip at the bottom */}
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "24px", display: "flex", gap: 12, justifyContent: "center", zIndex: 2, background: "linear-gradient(180deg, transparent, rgba(0,0,0,0.9))" }}>
          <Btn variant="red">Download the rules</Btn>
          <Btn variant="outline-dark">Read the brief</Btn>
        </div>
      </section>
    </div>
  );
}

// =============================================================================
// D — "Catalogue" — warm-ivory card treatment, illustration as featured artwork
// Light catalogue mode. Image sits in a 20px-radius card with hairline border —
// presented like a magazine feature, not a billboard. For the mod-detail page
// or a featured-tile in the gallery.
// =============================================================================
function NukeD() {
  return (
    <div style={{ background: "#f5f4ef", color: "#14161c", minHeight: "100%" }}>
      <NavBar activeSection="Mods" />
      <section style={{ padding: "64px 32px 88px" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          {/* Strap */}
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 40 }}>
            <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#4f5764", letterSpacing: "0.5px" }}>FEATURED MOD · MAY 2026</span>
            <span style={{ flex: 1, height: 1, background: "#14161c" }} />
            <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#4f5764", letterSpacing: "0.5px" }}>TOTAL CONVERSION · CATAN</span>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 48, alignItems: "center" }}>
            <div>
              <h1 style={{
                fontFamily: "var(--mg-font-display)",
                fontWeight: 600,
                fontSize: 108,
                lineHeight: 0.95,
                letterSpacing: "-3px",
                color: "#14161c",
                margin: "0 0 24px",
              }}>
                Are you ready to <em style={{ color: "#d11a1a" }}>nuke</em> Catan?
              </h1>
              <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, lineHeight: 1.6, color: "#3a3d44", margin: "0 0 32px", maxWidth: 440 }}>
                A family-friendly post-apocalyptic rules overhaul.
                Same tiles, same dice, brand new economy — and yes, your kids are going to love arguing about who set fire to the road network.
              </p>
              <div style={{ display: "flex", gap: 12, marginBottom: 28 }}>
                <Btn variant="red">Download the rules</Btn>
                <Btn variant="outline-light">View the brief</Btn>
              </div>
              <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 13, color: "#4f5764", paddingTop: 20, borderTop: "1px solid #e6e3d8" }}>
                3–5 players · 60 min · 12+ · v2.1.0
              </div>
            </div>

            <div style={{
              background: "#fff",
              border: "1px solid #e6e3d8",
              borderRadius: 24,
              padding: 24,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              position: "relative",
            }}>
              <div style={{ position: "absolute", inset: 24, background: "radial-gradient(circle, rgba(209,26,26,0.1) 0%, transparent 70%)", borderRadius: 16 }} />
              <img src={IMG} alt="" style={{ width: "100%", maxWidth: 460, height: "auto", position: "relative" }} />
            </div>
          </div>
        </div>
      </section>
    </div>
  );
}

window.NukeA = NukeA;
window.NukeB = NukeB;
window.NukeC = NukeC;
window.NukeD = NukeD;

function App() {
  return (
    <DesignCanvas title="Nuke Catan — Hero Treatments" defaultZoom={0.52}>
      <DCSection id="nuke" title="Four ways to treat the family illustration">
        <DCArtboard id="nuke-a" label="A — Direct (image + headline stacked, warm glow)" width={1280} height={1100}>
          <NukeA />
        </DCArtboard>
        <DCArtboard id="nuke-b" label="B — Split (image right, text left, warm palette)" width={1280} height={900}>
          <NukeB />
        </DCArtboard>
        <DCArtboard id="nuke-c" label="C — Theatre (cinematic billboard)" width={1280} height={900}>
          <NukeC />
        </DCArtboard>
        <DCArtboard id="nuke-d" label="D — Catalogue (warm-ivory editorial)" width={1280} height={900}>
          <NukeD />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
