<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moddable.Games — Creating games you already own</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #000; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  button:focus-visible, a:focus-visible {
    outline: 2px solid #6fb5ff;
    outline-offset: 3px;
    border-radius: 4px;
  }
  em { font-style: italic; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Buttons.jsx"></script>
<script type="text/babel" src="NavBar.jsx"></script>
<script type="text/babel" src="HexHorizon.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ModCard.jsx"></script>
<script type="text/babel" src="ModGallery.jsx"></script>
<script type="text/babel" src="NukeCatanFeature.jsx"></script>
<script type="text/babel" src="FeaturedMod.jsx"></script>
<script type="text/babel" src="NewsRow.jsx"></script>
<script type="text/babel" src="CommunityBand.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
  const [section, setSection] = React.useState("Mods");
  return (
    <div data-screen-label="Moddable.Games Marketing">
      <NavBar activeSection={section} onNav={setSection} />
      <Hero />
      <ModGallery />
      <NukeCatanFeature />
      <FeaturedMod />
      <NewsRow />
      <CommunityBand />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
