<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Talisman: Hexed — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #000; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/ModCard.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>

<script type="text/babel">

// =========================================================================
// Mod Detail · Talisman: Hexed
// Real mod copy lifted from moddable.games/mod/talisman/talisman-hexed/
// =========================================================================

function ModHeader() {
  return (
    <section style={{
      position: "relative",
      color: "#fff",
      overflow: "hidden",
      isolation: "isolate",
      background: "#000",
    }}>
      {/* Subtle radial glow keyed to mod category color (Reskin = blue) */}
      <div style={{
        position: "absolute",
        right: -200,
        top: "40%",
        width: 700,
        height: 700,
        background: "radial-gradient(circle, rgba(12,79,141,0.5) 0%, transparent 60%)",
        pointerEvents: "none",
      }} />

      <div style={{ position: "relative", zIndex: 2, padding: "56px 32px 100px" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          <a href="../marketing/index.html" style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "rgba(255,255,255,0.7)", textDecoration: "none" }}>← All mods</a>

        <div style={{ display: "flex", gap: 10, marginTop: 24, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 11, background: "#0c4f8d", color: "#fff", padding: "4px 10px", borderRadius: 9999, letterSpacing: "0.3px" }}>Reskin</span>
          <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "rgba(255,255,255,0.7)", padding: "4px 10px", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 9999 }}>base: Talisman 4e (revised)</span>
          <span style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#6fb5ff", padding: "5px 10px", letterSpacing: "1px" }}>v1.0.0</span>
        </div>

        <h1 style={{
          fontFamily: "var(--mg-font-display)",
          fontWeight: 600,
          fontSize: "clamp(48px, 7vw, 96px)",
          lineHeight: 1.0,
          letterSpacing: "-0.025em",
          margin: "20px 0 24px",
          maxWidth: 1000,
        }}>
          Talisman: <em style={{ color: "#6fb5ff" }}>Hexed</em>.
        </h1>

        <p style={{
          fontFamily: "var(--mg-font-body)",
          fontSize: 19,
          lineHeight: 1.55,
          color: "rgba(255,255,255,0.78)",
          maxWidth: 720,
          margin: "0 0 36px",
        }}>
          An open-world hex system that replaces the Talisman game boards with 61 individual hexagonal tiles —
          arranged in concentric rings so every game lays out differently. Built for <em>Talisman 4th Edition (revised)</em> by Fantasy Flight Games.
        </p>

        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 40 }}>
          <Btn variant="primary">
            <img src="../../assets/icons/download.svg" width="18" height="18" alt="" style={{ filter: "invert(1)" }} />
            Download rules
          </Btn>
          <Btn variant="outline-dark">Print-and-play pack</Btn>
        </div>

        {/* Stats */}
        <div style={{
          display: "flex", gap: 28, alignItems: "center", flexWrap: "wrap",
          paddingTop: 28, borderTop: "1px solid rgba(255,255,255,0.12)",
          fontFamily: "var(--mg-font-mono)",
        }}>
          {[
            ["Players", "2–6"], ["Time", "90 min"], ["Age", "13+"],
            ["Tiles", "61 hex"], ["Designer", "Moddable team"], ["Updated", "Apr 2024"]
          ].map(([k, v], i) => (
            <React.Fragment key={k}>
              {i > 0 && <span style={{ width: 1, height: 24, background: "rgba(255,255,255,0.12)" }} />}
              <div style={{ display: "flex", flexDirection: "column" }}>
                <span style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", letterSpacing: "1px" }}>{k}</span>
                <span style={{ fontWeight: 600, fontSize: 16, color: "#fff", marginTop: 4 }}>{v}</span>
              </div>
            </React.Fragment>
          ))}
        </div>
      </div>
      </div>
    </section>
  );
}

function RulesSection() {
  const sections = [
    { id: "1", title: "Why hex?", body: "The square Talisman board gets boring fast — same path, same encounters, same finale every game. Hexagonal tiles let us deal a new map each session and keep the journey unpredictable." },
    { id: "2", title: "The four rings", body: "61 tiles arranged in concentric rings: 24 outer (the world), 18 river, 12 middle (the highlands), 6 inner (the dungeon approach), plus one central tile (the Crown of Command)." },
    { id: "3", title: "Special tiles", body: "10 water tiles connect across rings via the river. 4 desert tiles act as Talisman's traditional 'Desert' region. The rest map onto the original board's encounter spaces, redistributed each game." },
    { id: "4", title: "Movement", body: "Roll 1d6 and move that many tiles in any direction along legal edges. You may cross river tiles only with a boat token, raft, or relevant character ability." },
    { id: "5", title: "What hasn't changed", body: "All Talisman 4e (revised) cards, characters, spell decks, and adventure cards work as-is. Hexed only replaces the board — your encounter library is untouched." },
  ];

  return (
    <section style={{ background: "#f5f4ef", padding: "88px 32px" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "240px 1fr", gap: 64 }}>
        <aside style={{ position: "sticky", top: 96, alignSelf: "start" }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#0c4f8d", letterSpacing: "1.5px", marginBottom: 18 }}>▲ THE RULES</div>
          <ol style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 10 }}>
            {sections.map(s => (
              <li key={s.id}>
                <a href={`#s${s.id}`} style={{
                  display: "flex", gap: 10, alignItems: "baseline",
                  fontFamily: "var(--mg-font-body)", fontSize: 14, color: "#14161c",
                  textDecoration: "none", padding: "4px 0",
                }}>
                  <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "#7a8290", minWidth: 18 }}>{s.id.padStart(2, "0")}</span>
                  {s.title}
                </a>
              </li>
            ))}
          </ol>
        </aside>

        <div>
          {sections.map(s => (
            <article key={s.id} id={`s${s.id}`} style={{ paddingBottom: 48, marginBottom: 48, borderBottom: "1px solid #e6e3d8" }}>
              <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#7a8290", letterSpacing: "0.5px", marginBottom: 10 }}>SECTION {s.id.padStart(2, "0")}</div>
              <h2 style={{
                fontFamily: "var(--mg-font-display)",
                fontWeight: 600,
                fontSize: 40,
                lineHeight: 1.15,
                letterSpacing: "-0.5px",
                color: "#14161c",
                margin: "0 0 16px",
              }}>{s.title}</h2>
              <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, lineHeight: 1.6, color: "#3a3d44", margin: 0, maxWidth: 640 }}>{s.body}</p>
            </article>
          ))}
        </div>
      </div>
    </section>
  );
}

function ComponentsList() {
  const items = [
    { kind: "Required",  list: ["Talisman 4e (revised) base game", "Card decks (Adventure, Spell, Purchase, Stranger, Warlock Quest)", "Character cards + miniatures"] },
    { kind: "Printable", list: ["61 × hexagonal tiles (PDF, included)", "Tile inventory + assembly diagram", "River movement tokens"] },
    { kind: "House",     list: ["1d6 standard die", "A large flat surface — 4ft × 3ft minimum", "Patience for tile shuffling"] },
  ];
  return (
    <section style={{ background: "#f5f4ef", padding: "0 32px 88px" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>
        <h2 style={{
          fontFamily: "var(--mg-font-display)",
          fontWeight: 600,
          fontSize: 48,
          lineHeight: 1.1,
          letterSpacing: "-0.6px",
          color: "#14161c",
          margin: "0 0 32px",
        }}>What you'll need.</h2>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
          {items.map(it => (
            <div key={it.kind} style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 16, padding: 24 }}>
              <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#0c4f8d", letterSpacing: "1px", marginBottom: 14 }}>{it.kind.toUpperCase()}</div>
              <ul style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 10 }}>
                {it.list.map(x => (
                  <li key={x} style={{ display: "flex", gap: 10, alignItems: "flex-start", fontFamily: "var(--mg-font-body)", fontSize: 14, color: "#1f2228", lineHeight: 1.45 }}>
                    <span style={{ width: 6, height: 6, marginTop: 8, background: "#0c4f8d", borderRadius: 1, flex: "none" }} />
                    {x}
                  </li>
                ))}
              </ul>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function RelatedMods() {
  // Real & related — other Talisman, plus a hexagonal-system relative
  const items = [
    { category: "Rebalance", baseGame: "Twilight Imperium 4e", title: "Hyper Imperium", body: "Hyper Movement · Hyper Trades · Hyper Agendas. A faster TI4 ruleset that keeps the politics intact.", stats: "3–6 players · 4–6 hr · 14+" },
    { category: "Total conversion", baseGame: "Monopoly", title: "Econopoly", body: "Monopoly converted into a family-friendly Euro-game. Resource management, victory points.", stats: "2–4 players · 60 min · 10+" },
    { category: "Total conversion", baseGame: "Catan", title: "Are you ready to <em>nuke</em> Catan?", body: "A post-apocalyptic rules overhaul. Sheep are scarce, brick is currency.", stats: "3–5 players · 60 min · 12+" },
  ];
  return (
    <section style={{ background: "#fff", padding: "88px 32px", borderTop: "1px solid #e6e3d8" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>
        <h2 style={{
          fontFamily: "var(--mg-font-display)",
          fontWeight: 600,
          fontSize: 40,
          lineHeight: 1.15,
          letterSpacing: "-0.5px",
          color: "#14161c",
          margin: "0 0 32px",
        }}>More from the library.</h2>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
          {items.map(m => <ModCard key={m.title} {...m} />)}
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <div data-screen-label="Mod Detail · Talisman Hexed">
      <NavBar activeSection="Mods" />
      <ModHeader />
      <RulesSection />
      <ComponentsList />
      <RelatedMods />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
