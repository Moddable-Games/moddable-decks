<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card col" style="gap: 12px;">
  <div class="tag" style="margin-bottom: 2px;">Functional + variants</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px;">
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#e63232;"></div><div class="col" style="gap:1px;"><span class="lbl">Red Bright</span><span class="meta">--mg-red-bright · #e63232</span></div></div>
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#a31212;"></div><div class="col" style="gap:1px;"><span class="lbl">Red Deep</span><span class="meta">--mg-red-deep · #a31212</span></div></div>
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#4eb735;"></div><div class="col" style="gap:1px;"><span class="lbl">Green Bright</span><span class="meta">--mg-green-bright · #4eb735</span></div></div>
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#2c7320;"></div><div class="col" style="gap:1px;"><span class="lbl">Green Deep</span><span class="meta">--mg-green-deep · #2c7320</span></div></div>
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#1a6dc4;"></div><div class="col" style="gap:1px;"><span class="lbl">Blue Bright</span><span class="meta">--mg-blue-bright · #1a6dc4</span></div></div>
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#07335c;"></div><div class="col" style="gap:1px;"><span class="lbl">Blue Deep</span><span class="meta">--mg-blue-deep · #07335c</span></div></div>
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#e89a1a;"></div><div class="col" style="gap:1px;"><span class="lbl">Warning</span><span class="meta">--mg-warning · #e89a1a</span></div></div>
    
      <div class="row"><div style="width:40px; height:28px; border-radius:6px; background:#1a6dc4;"></div><div class="col" style="gap:1px;"><span class="lbl">Link</span><span class="meta">--mg-link · #1a6dc4</span></div></div>
    
  </div>
</div>
</body></html>
