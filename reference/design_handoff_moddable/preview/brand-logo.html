<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; }
  
</style>
</head>
<body>

<div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap: 14px;">
  <div style="background:#000; padding: 24px; border-radius: 12px; display:flex; align-items:center; justify-content:center;">
    <img src="../assets/moddable-logo-white.png" style="max-width: 100%; max-height: 60px;" alt="Moddable.Games">
  </div>
  <div style="background:#f5f4ef; padding: 24px; border-radius: 12px; display:flex; align-items:center; justify-content:center; border:1px solid #e6e3d8;">
    <img src="../assets/moddable-logo.png" style="max-width: 100%; max-height: 60px;" alt="Moddable.Games">
  </div>
</div>
<div class="card" style="padding-top: 6px;"><div class="meta">moddable-logo-white.png on dark · moddable-logo.png (dark wordmark) on warm-ivory</div></div>
</body></html>
