<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card" style="background: #f5f4ef;">
  <div class="tag" style="margin-bottom: 10px;">Mod card — signature card (coloured top stripe)</div>
  <div style="background:#fff; border:1px solid #e6e3d8; border-radius:20px; overflow:hidden; max-width: 420px;">
    <div style="height:4px; background:#d11a1a;"></div>
    <div style="padding: 16px 20px;">
      <div style="height: 100px; background: linear-gradient(135deg,#0a0d2a,#3a7be8); border-radius:12px; margin-bottom:12px; position:relative; overflow:hidden;">
        <div style="position:absolute; inset:0; background-image:url('data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;28&quot; height=&quot;32&quot; viewBox=&quot;0 0 56 64&quot;><path d=&quot;M28 1 54 16v32L28 63 2 48V16z&quot; fill=&quot;none&quot; stroke=&quot;%23fff&quot; stroke-opacity=&quot;0.3&quot; stroke-width=&quot;1&quot;/></svg>'); background-size:28px 32px;"></div>
      </div>
      <div style="display:flex; align-items:flex-start; gap:8px;">
        <span style="font-family: var(--mg-font-body); font-weight:600; font-size:10px; background:#d11a1a; color:#fff; padding:3px 8px; border-radius:9999px;">Total conversion</span>
      </div>
      <div style="font-family: var(--mg-font-display); font-weight:600; font-size:22px; line-height:1.2; color:#14161c; margin-top:8px;">Are you ready to nuke <em>Catan</em>?</div>
      <div class="mg-mono-sm" style="color: var(--mg-mute); margin-top:6px;">3–5 players · 60 min · 12+ · v2.1.0</div>
    </div>
  </div>
</div>
</body></html>
