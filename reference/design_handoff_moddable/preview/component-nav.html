<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card" style="padding: 0; background:#000; border-radius: 12px; overflow:hidden;">
  <div style="height: 64px; padding: 0 22px; display:flex; align-items:center; gap: 24px;">
    <img src="../assets/moddable-logo.png" height="28" style="margin-top:2px;" alt="">
    <nav style="display:flex; gap: 22px; font-family: var(--mg-font-body); font-weight: 500; font-size: 14px; color:#fff; margin-left:14px;">
      <span>Mods</span><span style="opacity:.6;">Games</span><span style="opacity:.6;">Tools</span><span style="opacity:.6;">News</span>
    </nav>
    <div style="margin-left:auto; display:flex; gap: 10px; align-items:center;">
      <span style="font-family: var(--mg-font-pixel); font-size:9px; color:#6fb5ff; letter-spacing:1px;">▲ DISCORD</span>
      <button style="font-family: var(--mg-font-body); font-weight: 600; font-size:13px; background:#fff; color:#000; padding: 9px 16px; border-radius: 9999px; border:none; cursor:pointer;">Mod a game</button>
    </div>
  </div>
</div>
<div class="card" style="padding-top: 8px;"><div class="meta">nav-bar · 64px · canvas-dark · pixel Discord stinger · primary CTA right</div></div>
</body></html>
