<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); }
  * { box-sizing: border-box; }
  .card { padding: 0; }
  .label { padding: 14px 22px 16px; display: flex; justify-content: space-between; align-items: center; }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
</style>
</head>
<body>
  <div class="card">
    <div style="height: 220px; background-image: url('../assets/hex-horizon.jpg'); background-size: cover; background-position: center bottom; position: relative;">
      <div style="position:absolute; inset:0; background: linear-gradient(180deg, rgba(8,10,30,0.5) 0%, rgba(8,10,30,0.1) 40%, transparent 60%);"></div>
      <div style="position:absolute; inset:0; background: linear-gradient(180deg, transparent 65%, rgba(0,0,0,0.4) 85%, #000 100%);"></div>
      <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
        <div style="font-family: var(--mg-font-pixel); font-size: 10px; color:#6fb5ff; letter-spacing: 2px; text-shadow: 0 0 12px rgba(111,181,255,0.5);">▲ HEX HORIZON</div>
        <div style="font-family: var(--mg-font-display); font-weight: 600; font-size: 28px; color: #fff; line-height:1; letter-spacing:-0.5px; margin-top: 8px; text-shadow: 0 2px 20px rgba(0,0,0,0.6);">The brand backdrop</div>
      </div>
    </div>
    <div class="label">
      <span class="tag">assets/hex-horizon.jpg</span>
      <span class="meta">875×500 · use on every dark hero band</span>
    </div>
  </div>
</body>
</html>
