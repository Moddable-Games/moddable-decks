<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card">
  <div class="tag" style="margin-bottom: 12px;">Game stats row — mono</div>
  <div style="display:flex; gap: 24px; align-items:center; padding: 14px 18px; background: #f5f4ef; border-radius: 12px;">
    <div style="display:flex; flex-direction:column;">
      <span class="meta" style="text-transform:uppercase; letter-spacing:0.5px;">Players</span>
      <span class="mg-mono-md" style="color:#14161c; font-size:18px; font-weight:600;">3–5</span>
    </div>
    <div style="width:1px; height:30px; background:#e6e3d8;"></div>
    <div style="display:flex; flex-direction:column;">
      <span class="meta" style="text-transform:uppercase; letter-spacing:0.5px;">Time</span>
      <span class="mg-mono-md" style="color:#14161c; font-size:18px; font-weight:600;">45 min</span>
    </div>
    <div style="width:1px; height:30px; background:#e6e3d8;"></div>
    <div style="display:flex; flex-direction:column;">
      <span class="meta" style="text-transform:uppercase; letter-spacing:0.5px;">Age</span>
      <span class="mg-mono-md" style="color:#14161c; font-size:18px; font-weight:600;">12+</span>
    </div>
    <div style="width:1px; height:30px; background:#e6e3d8;"></div>
    <div style="display:flex; flex-direction:column;">
      <span class="meta" style="text-transform:uppercase; letter-spacing:0.5px;">Dice</span>
      <span class="mg-mono-md" style="color:#14161c; font-size:18px; font-weight:600;">2d6+1</span>
    </div>
  </div>
</div>
</body></html>
