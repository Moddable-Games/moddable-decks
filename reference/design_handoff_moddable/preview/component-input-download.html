<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card">
  <div class="tag" style="margin-bottom: 10px;">Input · Download tile</div>
  <div style="display:flex; gap: 10px;">
    <div style="flex:1; height:52px; padding: 0 16px; border: 1px solid #e6e3d8; border-radius: 12px; font-family: var(--mg-font-body); font-size: 15px; color:#7a8290; background:#fff; display:flex; align-items:center;">Search 12 mods…</div>
    <div style="background:#000; color:#fff; border-radius: 12px; padding: 0 18px; height: 52px; display:flex; align-items:center; gap:10px;">
      <div style="width:24px; height:24px; background:#d11a1a; border-radius:4px; transform:rotate(45deg);"></div>
      <div style="display:flex; flex-direction:column; line-height:1.1;">
        <span style="font-family:var(--mg-font-mono); font-size:10px; opacity:.7;">rules.pdf</span>
        <span style="font-family:var(--mg-font-display); font-weight:600; font-size:14px;">Download</span>
      </div>
    </div>
  </div>
  <div class="meta" style="margin-top: 10px;">text-input · 52px · radius-md  ·  download-tile</div>
</div>
</body></html>
