<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card" style="background:#000;">
  <div class="tag" style="color: rgba(255,255,255,0.4); margin-bottom: 12px;">Primary CTAs · on dark</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button style="font-family: var(--mg-font-body); font-weight: 600; font-size: 16px; letter-spacing: 0.2px; height: 48px; padding: 0 24px; border-radius: 9999px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; background:#fff; color:#000;">Roll into it</button>
    <button style="font-family: var(--mg-font-body); font-weight: 600; font-size: 16px; letter-spacing: 0.2px; height: 48px; padding: 0 24px; border-radius: 9999px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; background:#0c4f8d; color:#fff;">Download rules</button>
    <button style="font-family: var(--mg-font-body); font-weight: 600; font-size: 16px; letter-spacing: 0.2px; height: 48px; padding: 0 24px; border-radius: 9999px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; background:transparent; color:#fff; border:1px solid #fff;">Browse all mods</button>
  </div>
  <div class="meta" style="margin-top: 10px; color: rgba(255,255,255,0.5);">btn-primary (white) · btn-blue (brand) · btn-outline-dark · all 48px pills</div>
</div>
</body></html>
