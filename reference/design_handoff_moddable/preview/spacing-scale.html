<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card">
  <div class="tag" style="margin-bottom: 12px;">Spacing scale — base 4px</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px 32px;">
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:4px; border-radius:2px;"></div><span class="lbl" style="width:50px;">xxs</span><span class="meta">4px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:6px; border-radius:2px;"></div><span class="lbl" style="width:50px;">xs</span><span class="meta">6px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:8px; border-radius:2px;"></div><span class="lbl" style="width:50px;">sm</span><span class="meta">8px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:14px; border-radius:2px;"></div><span class="lbl" style="width:50px;">md</span><span class="meta">14px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:16px; border-radius:2px;"></div><span class="lbl" style="width:50px;">lg</span><span class="meta">16px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:24px; border-radius:2px;"></div><span class="lbl" style="width:50px;">xl</span><span class="meta">24px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:32px; border-radius:2px;"></div><span class="lbl" style="width:50px;">xxl</span><span class="meta">32px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:48px; border-radius:2px;"></div><span class="lbl" style="width:50px;">xxxl</span><span class="meta">48px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:80px; border-radius:2px;"></div><span class="lbl" style="width:50px;">block</span><span class="meta">80px</span></div>
    
      <div style="display:flex; align-items:center; gap:10px;"><div style="background:#14161c; height:10px; width:88px; border-radius:2px;"></div><span class="lbl" style="width:50px;">section</span><span class="meta">88px</span></div>
    
  </div>
</div>
</body></html>
