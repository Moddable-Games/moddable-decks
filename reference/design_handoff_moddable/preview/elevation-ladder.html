<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card">
  <div class="tag" style="margin-bottom: 10px;">Elevation — no shadows. Depth = canvas + cosmic gradient + hex grid.</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div style="background:#f5f4ef; padding:14px; border-radius:10px;"><div style="background:#fff; border:1px solid #e6e3d8; border-radius:12px; padding:12px;"><div class="lbl">L1 — surface card</div><div class="meta">card on warm-ivory band</div></div></div>
    <div style="background:#000; padding:14px; border-radius:10px;"><div style="background:#161721; border-radius:12px; padding:12px;"><div class="lbl" style="color:#fff;">L2 — surface elevated</div><div class="meta" style="color:#7a8290;">#161721 · plan/mod card on dark</div></div></div>
    <div style="background:#000; padding:14px; border-radius:10px;"><div style="background:#0c4f8d; border-radius:12px; padding:12px;"><div class="lbl" style="color:#fff;">L3 — featured surface</div><div class="meta" style="color:rgba(255,255,255,.7);">Mod Blue fill, featured mod / plan</div></div></div>
    <div style="background:linear-gradient(180deg,#0a0d2a,#000); padding:14px; border-radius:10px; position:relative; overflow:hidden;">
      <div style="position:absolute; inset:0; background-image:url('data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;28&quot; height=&quot;32&quot; viewBox=&quot;0 0 56 64&quot;><path d=&quot;M28 1 54 16v32L28 63 2 48V16z&quot; fill=&quot;none&quot; stroke=&quot;%236fb5ff&quot; stroke-opacity=&quot;0.35&quot; stroke-width=&quot;1&quot;/></svg>'); background-size: 28px 32px;"></div>
      <div style="position:relative;"><div class="lbl" style="color:#fff;">L4 — cosmic hero</div><div class="meta" style="color:#7a8290;">gradient + hex-grid overlay</div></div>
    </div>
  </div>
</div>
</body></html>
