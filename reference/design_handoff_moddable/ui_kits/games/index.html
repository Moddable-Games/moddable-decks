<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>All games — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>
<script type="text/babel" src="../marketing/registry.jsx"></script>

<script type="text/babel">

function GameCard({ game }) {
  return (
    <a href={game.href} style={{
      background: "#fff",
      border: "1px solid #e6e3d8",
      borderRadius: 20,
      overflow: "hidden",
      textDecoration: "none",
      color: "inherit",
      display: "flex",
      flexDirection: "column",
      transition: "border-color 180ms, transform 180ms",
    }}
      onMouseEnter={(e) => { e.currentTarget.style.borderColor = game.color; e.currentTarget.style.transform = "translateY(-2px)"; }}
      onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#e6e3d8"; e.currentTarget.style.transform = "translateY(0)"; }}
    >
      <div style={{ height: 4, background: game.color }} />
      <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 14, flex: 1 }}>
        <div style={{
          height: 160,
          background: `linear-gradient(135deg, #0a0d2a 0%, ${game.color} 100%)`,
          borderRadius: 12,
          position: "relative",
          overflow: "hidden",
        }}>
          <div style={{
            position: "absolute", inset: 0,
            backgroundImage: `url("data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='28' height='32' viewBox='0 0 56 64'><path d='M28 1 54 16v32L28 63 2 48V16z' fill='none' stroke='#fff' stroke-opacity='0.35' stroke-width='1'/></svg>`)}")`,
            backgroundSize: "28px 32px",
          }} />
          <div style={{ position: "absolute", bottom: 12, left: 14, fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "rgba(255,255,255,0.7)", letterSpacing: "1px" }}>▲ ORIGINAL</div>
        </div>
        <h3 style={{
          fontFamily: "var(--mg-font-display)",
          fontWeight: 600,
          fontSize: 28,
          lineHeight: 1.15,
          letterSpacing: "-0.4px",
          color: "#14161c",
          margin: 0,
        }}>{game.title}</h3>
        <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 15, lineHeight: 1.55, color: "#3a3d44", margin: 0, flex: 1 }}>
          {game.body}
        </p>
        <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#4f5764", paddingTop: 12, borderTop: "1px solid #e6e3d8" }}>
          {game.stats}
        </div>
      </div>
    </a>
  );
}

function App() {
  return (
    <div data-screen-label="Games Index">
      <NavBar />
      <section style={{ background: "#000", color: "#fff", padding: "56px 32px 80px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", right: -100, top: 0, width: 700, height: 700, background: "radial-gradient(circle, rgba(58,123,232,0.28) 0%, transparent 65%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 1200, margin: "0 auto", position: "relative" }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 11, color: "#6fb5ff", letterSpacing: "2px", marginBottom: 22 }}>▲ OUR GAMES</div>
          <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(48px, 7vw, 96px)", lineHeight: 0.95, letterSpacing: "-0.025em", margin: 0 }}>
            Built to be modded.
          </h1>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 18, lineHeight: 1.55, color: "rgba(255,255,255,0.82)", maxWidth: 640, margin: "20px 0 0" }}>
            Three original games designed to be torn apart and put back together.
            Every rulebook in a git repo, every component CC-licensed, every faction a hook.
          </p>
        </div>
      </section>
      <section style={{ background: "#f5f4ef", padding: "56px 32px 96px" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 20 }}>
          {GAMES.map(g => <GameCard key={g.slug} game={g} />)}
        </div>
      </section>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
