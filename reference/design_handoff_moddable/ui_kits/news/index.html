<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>News and updates — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>
<script type="text/babel" src="posts.jsx"></script>

<script type="text/babel">

// Pixel-render a small cover panel — abstract atmosphere, no AI imagery
function PostCover({ color, label, big }) {
  const sz = big ? 56 : 28;
  return (
    <div style={{
      position: "relative",
      width: "100%",
      aspectRatio: big ? "1.7" : "1.65",
      background: `linear-gradient(135deg, #0a0d2a 0%, ${color} 100%)`,
      borderRadius: 12,
      overflow: "hidden",
    }}>
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage: `url("data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='${sz}' height='${sz * 8/7}' viewBox='0 0 56 64'><path d='M28 1 54 16v32L28 63 2 48V16z' fill='none' stroke='#fff' stroke-opacity='0.18' stroke-width='1'/></svg>`)}")`,
        backgroundSize: `${sz}px ${sz * 8/7}px`,
      }} />
      {big && (
        <div style={{
          position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <span style={{
            fontFamily: "var(--mg-font-pixel)", fontSize: 18, color: "rgba(255,255,255,0.6)", letterSpacing: "2px",
            textShadow: "0 0 12px rgba(255,255,255,0.2)",
          }}>{label}</span>
        </div>
      )}
    </div>
  );
}

function NewsHeader() {
  return (
    <section style={{
      position: "relative",
      color: "#fff",
      overflow: "hidden",
      isolation: "isolate",
      background: "#000",
      minHeight: 380,
    }}>
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage: "url('../../assets/hex-horizon.jpg')",
        backgroundSize: "cover",
        backgroundPosition: "center bottom",
      }} />
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0.65) 0%, rgba(8,10,30,0.35) 50%, rgba(8,10,30,0.3) 100%)" }} />
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.6) 90%, #f5f4ef 100%)" }} />

      <div style={{ position: "relative", padding: "72px 32px 88px", maxWidth: 1200, margin: "0 auto" }}>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 11, color: "#6fb5ff", letterSpacing: "2px", marginBottom: 28, textShadow: "0 0 12px rgba(111,181,255,0.5)" }}>▲ NEWS & UPDATES</div>

        <h1 style={{
          fontFamily: "var(--mg-font-display)",
          fontWeight: 600,
          fontSize: "clamp(56px, 7.5vw, 112px)",
          lineHeight: 0.95,
          letterSpacing: "-0.025em",
          margin: 0,
          textShadow: "0 4px 30px rgba(0,0,0,0.5)",
        }}>
          News & updates.
        </h1>

        <p style={{
          fontFamily: "var(--mg-font-body)",
          fontStyle: "italic",
          fontSize: 22,
          lineHeight: 1.45,
          color: "rgba(255,255,255,0.86)",
          margin: "20px 0 0",
          textShadow: "0 2px 14px rgba(0,0,0,0.6)",
        }}>
          Strictly written by humans.
        </p>
      </div>
    </section>
  );
}

function FeaturedPost({ post }) {
  return (
    <a href="post.html" style={{
      display: "grid", gridTemplateColumns: "1.1fr 1fr",
      gap: 40, alignItems: "center",
      background: "#fff", border: "1px solid #e6e3d8", borderRadius: 20,
      padding: 32, textDecoration: "none", color: "inherit",
      marginBottom: 48,
      transition: "border-color 180ms",
    }}
      onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#14161c"; }}
      onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#e6e3d8"; }}
    >
      <PostCover color={post.cover} label={post.cat.split(" ")[0].toUpperCase()} big />
      <div>
        <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14, flexWrap: "wrap" }}>
          <span style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 11, background: "#14161c", color: "#fff", padding: "4px 10px", borderRadius: 9999, letterSpacing: "0.3px" }}>FEATURED</span>
          <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#7a8290" }}>{post.cat}  ·  {post.date}</span>
        </div>
        <h2 style={{
          fontFamily: "var(--mg-font-display)",
          fontWeight: 600,
          fontSize: 40,
          lineHeight: 1.1,
          letterSpacing: "-0.5px",
          color: "#14161c",
          margin: "0 0 14px",
        }}>{post.title}</h2>
        <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 16, lineHeight: 1.55, color: "#3a3d44", margin: "0 0 18px" }}>
          {post.excerpt}
        </p>
        <span style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 14, color: "#0c4f8d" }}>
          Read the article →
        </span>
      </div>
    </a>
  );
}

function PostCard({ post }) {
  return (
    <a href="post.html" style={{
      display: "flex", flexDirection: "column", gap: 16,
      padding: 20, background: "#fff", border: "1px solid #e6e3d8",
      borderRadius: 16, textDecoration: "none", color: "inherit",
      transition: "border-color 180ms",
    }}
      onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#14161c"; }}
      onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#e6e3d8"; }}
    >
      <PostCover color={post.cover} />
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "#7a8290", letterSpacing: "0.3px" }}>{post.cat.toUpperCase()}</span>
        <span style={{ width: 3, height: 3, background: "#c3c5cc", borderRadius: 4 }} />
        <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "#7a8290" }}>{post.date}</span>
      </div>
      <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 22, lineHeight: 1.2, letterSpacing: "-0.25px", color: "#14161c", margin: 0 }}>
        {post.title}
      </h3>
      <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 14, lineHeight: 1.55, color: "#4f5764", margin: 0 }}>
        {post.excerpt}
      </p>
    </a>
  );
}

function Sidebar() {
  return (
    <aside style={{ display: "flex", flexDirection: "column", gap: 32 }}>
      {/* Search */}
      <div>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#0c4f8d", letterSpacing: "1.5px", marginBottom: 12 }}>▲ SEARCH</div>
        <div style={{ position: "relative" }}>
          <input
            placeholder="Search the archive..."
            style={{
              width: "100%", height: 48, padding: "0 16px 0 44px",
              border: "1px solid #e6e3d8", borderRadius: 12,
              fontFamily: "var(--mg-font-body)", fontSize: 14,
              background: "#fff", outline: "none",
            }}
          />
          <img src="../../assets/icons/search.svg" width="16" height="16" alt=""
            style={{ position: "absolute", left: 16, top: "50%", transform: "translateY(-50%)", opacity: 0.5 }} />
        </div>
      </div>

      {/* Hot Topics */}
      <div>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#d11a1a", letterSpacing: "1.5px", marginBottom: 12 }}>▲ HOT TOPICS</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {CATEGORIES.map(([name, count]) => (
            <a key={name} href="#" style={{
              fontFamily: "var(--mg-font-body)",
              fontWeight: 600, fontSize: 12,
              padding: "6px 12px",
              background: "#fff", color: "#14161c",
              border: "1px solid #e6e3d8",
              borderRadius: 9999,
              textDecoration: "none",
              display: "inline-flex", alignItems: "center", gap: 6,
            }}>
              {name}
              <span style={{ fontFamily: "var(--mg-font-mono)", color: "#7a8290", fontSize: 11 }}>{count}</span>
            </a>
          ))}
        </div>
      </div>

      {/* Archives */}
      <div>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#3a9928", letterSpacing: "1.5px", marginBottom: 12 }}>▲ ARCHIVES</div>
        <ul style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 4 }}>
          {ARCHIVES.map(m => (
            <li key={m}>
              <a href="#" style={{
                fontFamily: "var(--mg-font-mono)", fontSize: 13,
                color: "#3a3d44", textDecoration: "none",
                padding: "4px 0",
              }}>{m}</a>
            </li>
          ))}
        </ul>
      </div>

      {/* Discord stinger */}
      <div style={{ background: "#000", color: "#fff", padding: 24, borderRadius: 16, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", right: -50, top: -50, width: 200, height: 200, background: "radial-gradient(circle, rgba(58,123,232,0.3) 0%, transparent 65%)", pointerEvents: "none" }} />
        <div style={{ position: "relative" }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#6fb5ff", letterSpacing: "1.5px", marginBottom: 12 }}>▲ JOIN US</div>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 14, lineHeight: 1.5, color: "rgba(255,255,255,0.86)", margin: "0 0 14px" }}>
            2,400+ rule-tinkerers in the Discord.
          </p>
          <a href="#" style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 13, color: "#fff", textDecoration: "underline" }}>
            Open the Discord →
          </a>
        </div>
      </div>
    </aside>
  );
}

function NewsBody() {
  const [featured, ...rest] = POSTS;
  return (
    <section style={{ background: "#f5f4ef", padding: "56px 32px 96px" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 260px", gap: 56 }}>
        <div>
          <FeaturedPost post={featured} />

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#14161c", letterSpacing: "1.5px" }}>▲ THE ARCHIVE · 11 POSTS</div>
            <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#7a8290" }}>Newest first</div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }}>
            {rest.map(p => <PostCard key={p.slug} post={p} />)}
          </div>
        </div>
        <Sidebar />
      </div>
    </section>
  );
}

function App() {
  return (
    <div data-screen-label="News Index">
      <NavBar activeSection="News" />
      <NewsHeader />
      <NewsBody />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
