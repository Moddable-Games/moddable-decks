<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nukes tools — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../../marketing/Footer.jsx"></script>

<script type="text/babel">

function ToolCard({ accent = "#d11a1a", eyebrow, title, desc, children }) {
  return (
    <section style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 20, padding: 32, marginBottom: 24 }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 16, marginBottom: 22, paddingBottom: 22, borderBottom: "1px solid #e6e3d8" }}>
        <div style={{ width: 6, height: 48, background: accent, borderRadius: 3, flex: "none" }} />
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: accent, letterSpacing: "1.5px", marginBottom: 6 }}>{eyebrow}</div>
          <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 24, color: "#14161c", margin: 0, letterSpacing: "-0.3px" }}>{title}</h3>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 14, color: "#4f5764", margin: "4px 0 0" }}>{desc}</p>
        </div>
      </div>
      {children}
    </section>
  );
}

// =========================================================================
// Target picker — hex map. Click a hex to "launch" — fallout markers spread.
// =========================================================================
function TargetPicker() {
  const cols = 9, rows = 5;
  const [strikes, setStrikes] = React.useState([]);
  // Pre-compute hex grid coords
  const hexes = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      hexes.push({
        r, c,
        x: c * 36 + (r % 2) * 18 + 22,
        y: r * 31 + 22,
        id: `${r}-${c}`,
      });
    }
  }
  function fire(id) {
    if (strikes.includes(id)) return;
    setStrikes(s => [...s, id]);
  }
  function clear() { setStrikes([]); }
  function isFallout(h) {
    return strikes.some(id => {
      const [sr, sc] = id.split("-").map(Number);
      return Math.abs(sr - h.r) + Math.abs(sc - h.c) <= 1 && id !== h.id;
    });
  }
  return (
    <ToolCard accent="#d11a1a" eyebrow="▲ NUKES" title="Target picker" desc="Click a hex to launch. Adjacent hexes pick up fallout markers automatically. Build your strategy before committing.">
      <div style={{ background: "#0a0d2a", borderRadius: 14, padding: 24, position: "relative", overflow: "hidden", marginBottom: 14 }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 50% 50%, rgba(209,26,26,0.18) 0%, transparent 70%)" }} />
        <svg width="100%" height="200" viewBox="0 0 360 200" style={{ position: "relative" }}>
          {hexes.map(h => {
            const struck = strikes.includes(h.id);
            const fall = !struck && isFallout(h);
            return (
              <g key={h.id} onClick={() => fire(h.id)} style={{ cursor: "pointer" }}>
                <polygon
                  transform={`translate(${h.x}, ${h.y})`}
                  points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8"
                  fill={struck ? "#d11a1a" : fall ? "#7a3a18" : "rgba(255,255,255,0.06)"}
                  stroke={struck ? "#e63232" : "rgba(255,255,255,0.25)"}
                  strokeWidth={struck ? "2" : "1"}
                />
                {struck && (
                  <text x={h.x} y={h.y + 4} fontSize="14" fill="#fff" textAnchor="middle" pointerEvents="none">☢</text>
                )}
                {fall && (
                  <circle cx={h.x} cy={h.y} r="3" fill="#e89a1a" pointerEvents="none" />
                )}
              </g>
            );
          })}
        </svg>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 13, color: "#4f5764" }}>
          Strikes: <strong style={{ color: "#d11a1a" }}>{strikes.length}</strong>  ·  Fallout hexes: <strong>{hexes.filter(isFallout).length}</strong>
        </div>
        <Btn variant="outline-light" onClick={clear}>Clear board</Btn>
      </div>
    </ToolCard>
  );
}

// =========================================================================
// Fallout tracker — countdown per affected zone
// =========================================================================
function FalloutTracker() {
  const [zones, setZones] = React.useState([
    { name: "Sector 4-Charlie", turns: 3, severity: 3 },
    { name: "Sector 7-Foxtrot", turns: 2, severity: 2 },
    { name: "Sector 2-Alpha",   turns: 1, severity: 1 },
  ]);
  function tick() { setZones(zs => zs.map(z => ({ ...z, turns: Math.max(0, z.turns - 1) }))); }
  function reset() { setZones(zs => zs.map(z => ({ ...z, turns: z.severity }))); }
  return (
    <ToolCard accent="#e89a1a" eyebrow="▲ NUKES" title="Fallout tracker" desc="Severity 1–3, decrementing each turn. When turns hit zero, the zone clears.">
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
        {zones.map((z, i) => (
          <div key={z.name} style={{
            display: "grid", gridTemplateColumns: "1fr auto auto", gap: 14, alignItems: "center",
            background: z.turns === 0 ? "#f5f4ef" : "#fff", border: "1px solid #e6e3d8",
            borderRadius: 12, padding: "14px 18px",
          }}>
            <div>
              <div style={{ fontFamily: "var(--mg-font-mono)", fontWeight: 600, fontSize: 14, color: z.turns === 0 ? "#7a8290" : "#14161c", textDecoration: z.turns === 0 ? "line-through" : "none" }}>{z.name}</div>
              <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
                {[1,2,3].map(n => (
                  <span key={n} style={{ width: 12, height: 12, background: n <= z.severity ? "#e89a1a" : "#e6e3d8", borderRadius: 2 }} />
                ))}
              </div>
            </div>
            <div style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 28, color: z.turns === 0 ? "#7a8290" : "#d11a1a", lineHeight: 1 }}>{z.turns}</div>
            <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "#7a8290", textTransform: "uppercase", letterSpacing: "0.5px" }}>turns</span>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <Btn variant="dark" onClick={tick}>Advance turn</Btn>
        <Btn variant="outline-light" onClick={reset}>Reset</Btn>
      </div>
    </ToolCard>
  );
}

function App() {
  return (
    <div data-screen-label="Nukes Tools">
      <NavBar />
      <section style={{ background: "#000", color: "#fff", padding: "56px 32px 80px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", left: "50%", top: "30%", transform: "translateX(-50%)", width: 900, height: 500, background: "radial-gradient(ellipse, rgba(209,26,26,0.32) 0%, transparent 65%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 960, margin: "0 auto", position: "relative" }}>
          <a href="../index.html" style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "rgba(255,255,255,0.7)", textDecoration: "none" }}>← All tools</a>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 10, color: "#e63232", letterSpacing: "1.5px", marginTop: 22, marginBottom: 16, textShadow: "0 0 14px rgba(230,50,50,0.6)" }}>▲ NUKES TOOLS</div>
          <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(48px, 6vw, 84px)", lineHeight: 1.0, letterSpacing: "-0.025em", margin: 0 }}>
            <em style={{ color: "#e63232" }}>Tools</em> for the doomsday clock.
          </h1>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, color: "rgba(255,255,255,0.78)", margin: "18px 0 0", maxWidth: 580, lineHeight: 1.55 }}>
            Target picker and fallout tracker for the <em>Nukes</em> original game.
            Built for 2–4 players, 45 minutes, plenty of regret.
          </p>
        </div>
      </section>
      <section style={{ background: "#f5f4ef", padding: "56px 32px 96px" }}>
        <div style={{ maxWidth: 760, margin: "0 auto" }}>
          <TargetPicker />
          <FalloutTracker />
        </div>
      </section>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
