<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tools — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>
<script type="text/babel" src="Tools.jsx"></script>

<script type="text/babel">

function ToolsHeader() {
  return (
    <section style={{ background: "#000", color: "#fff", padding: "64px 32px 88px", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", left: -150, top: "30%", width: 600, height: 600, background: "radial-gradient(circle, rgba(58,123,232,0.22) 0%, transparent 65%)", pointerEvents: "none" }} />
      <div style={{ maxWidth: 1200, margin: "0 auto", position: "relative" }}>
        <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 10, color: "#6fb5ff", letterSpacing: "1.5px", marginBottom: 18 }}>▲ THE WORKBENCH</div>
        <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(48px, 6vw, 88px)", lineHeight: 1.0, letterSpacing: "-0.025em", margin: 0, maxWidth: 900 }}>
          The toys we built<br />for the table.
        </h1>
        <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 18, lineHeight: 1.55, color: "rgba(255,255,255,0.78)", maxWidth: 600, margin: "24px 0 0" }}>
          A dice roller for when you've lost yours under the couch.
          A name generator for hex-tile heroes. A scoreboard for everything else.
        </p>
      </div>
    </section>
  );
}

function ToolsBody() {
  return (
    <section style={{ background: "#f5f4ef", padding: "64px 32px 88px" }}>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>

        {/* Mod-specific tool links */}
        <div style={{ marginBottom: 48 }}>
          <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 36, lineHeight: 1.15, letterSpacing: "-0.5px", color: "#14161c", margin: "0 0 8px" }}>Mod-specific tools.</h2>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 15, color: "#4f5764", margin: "0 0 24px" }}>Built for individual mods. Pick yours.</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            {[
              { href: "twilight-imperium/index.html", name: "Twilight Imperium", desc: "Faction draft · objectives · agendas", color: "#0c4f8d" },
              { href: "talisman/index.html",          name: "Talisman: Hexed",   desc: "Character lottery · hex board · encounters", color: "#5d2a8a" },
              { href: "nukes/index.html",             name: "Nukes",             desc: "Target picker · fallout tracker", color: "#d11a1a" },
            ].map(t => (
              <a key={t.name} href={t.href} style={{
                display: "flex", flexDirection: "column", gap: 10,
                padding: 20, background: "#fff", border: "1px solid #e6e3d8",
                borderRadius: 16, textDecoration: "none", color: "inherit",
                opacity: t.soon ? 0.6 : 1, transition: "border-color 180ms, transform 180ms",
              }}
                onMouseEnter={(e) => { if (!t.soon) { e.currentTarget.style.borderColor = t.color; e.currentTarget.style.transform = "translateY(-2px)"; } }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#e6e3d8"; e.currentTarget.style.transform = "translateY(0)"; }}
              >
                <div style={{ width: 32, height: 4, background: t.color, borderRadius: 2 }} />
                <div style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 18, color: "#14161c", letterSpacing: "-0.2px" }}>{t.name}</div>
                <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#4f5764", lineHeight: 1.5 }}>{t.desc}</div>
              </a>
            ))}
          </div>
        </div>

        {/* Universal tools */}
        <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 36, lineHeight: 1.15, letterSpacing: "-0.5px", color: "#14161c", margin: "0 0 8px" }}>Universal tools.</h2>
        <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 15, color: "#4f5764", margin: "0 0 24px" }}>For every mod, every game, every table.</p>

        <DiceRoller />
        <NameGenerator />
        <ScoringTracker />
      </div>
    </section>
  );
}

function App() {
  return (
    <div data-screen-label="Tools">
      <NavBar activeSection="Tools" />
      <ToolsHeader />
      <ToolsBody />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
