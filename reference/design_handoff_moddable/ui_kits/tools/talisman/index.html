<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Talisman tools — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #f5f4ef; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../../marketing/Footer.jsx"></script>

<script type="text/babel">

// =========================================================================
// Talisman-specific tools — character lottery, hex board generator, encounter
// quick-draw. All keyed to Talisman: Hexed's 4-ring system.
// =========================================================================

function ToolCard({ accent = "#5d2a8a", eyebrow, title, desc, children }) {
  return (
    <section style={{ background: "#fff", border: "1px solid #e6e3d8", borderRadius: 20, padding: 32, marginBottom: 24 }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 16, marginBottom: 22, paddingBottom: 22, borderBottom: "1px solid #e6e3d8" }}>
        <div style={{ width: 6, height: 48, background: accent, borderRadius: 3, flex: "none" }} />
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: accent, letterSpacing: "1.5px", marginBottom: 6 }}>{eyebrow}</div>
          <h3 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 24, color: "#14161c", margin: 0, letterSpacing: "-0.3px" }}>{title}</h3>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 14, color: "#4f5764", margin: "4px 0 0" }}>{desc}</p>
        </div>
      </div>
      {children}
    </section>
  );
}

// Character lottery
const TALISMAN_CHARS = [
  { name: "Warrior",   strength: 4, craft: 2, lives: 4 },
  { name: "Wizard",    strength: 2, craft: 4, lives: 4 },
  { name: "Druid",     strength: 3, craft: 3, lives: 4 },
  { name: "Priest",    strength: 2, craft: 4, lives: 4 },
  { name: "Sorceress", strength: 2, craft: 4, lives: 3 },
  { name: "Thief",     strength: 2, craft: 3, lives: 4 },
  { name: "Troll",     strength: 5, craft: 1, lives: 5 },
  { name: "Ghoul",     strength: 3, craft: 3, lives: 4 },
  { name: "Assassin",  strength: 3, craft: 2, lives: 4 },
  { name: "Minstrel",  strength: 2, craft: 3, lives: 4 },
  { name: "Monk",      strength: 3, craft: 3, lives: 4 },
  { name: "Dwarf",     strength: 4, craft: 2, lives: 5 },
];

function CharacterLottery() {
  const [picks, setPicks] = React.useState([]);
  const [count, setCount] = React.useState(4);
  function draw() {
    const shuffled = [...TALISMAN_CHARS].sort(() => Math.random() - 0.5);
    setPicks(shuffled.slice(0, count));
  }
  React.useEffect(draw, []);

  return (
    <ToolCard accent="#5d2a8a" eyebrow="▲ TALISMAN: HEXED" title="Character lottery" desc="Random character draw for each player. Pulls from the Talisman 4e (revised) base set + Reaper expansion.">
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 20, flexWrap: "wrap" }}>
        <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#7a8290", textTransform: "uppercase", letterSpacing: "0.5px" }}>Players:</span>
        {[2,3,4,5,6].map(n => (
          <button key={n} onClick={() => setCount(n)} style={{
            width: 36, height: 36, borderRadius: 9999, cursor: "pointer",
            background: count === n ? "#14161c" : "#f5f4ef",
            color: count === n ? "#fff" : "#14161c",
            border: `1px solid ${count === n ? "#14161c" : "#e6e3d8"}`,
            fontFamily: "var(--mg-font-mono)", fontWeight: 600, fontSize: 13,
          }}>{n}</button>
        ))}
        <Btn variant="dark" onClick={draw} style={{ marginLeft: "auto" }}>
          <img src="../../../assets/icons/roll.svg" width="16" height="16" alt="" style={{ filter: "invert(1)" }} />
          Draw
        </Btn>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10 }}>
        {picks.map((c, i) => (
          <div key={i} style={{
            background: "#f5f4ef", padding: "14px 18px", borderRadius: 12,
            display: "flex", alignItems: "center", gap: 14,
          }}>
            <div style={{ width: 36, height: 36, borderRadius: 9999, background: "#5d2a8a", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--mg-font-pixel)", fontSize: 10, color: "#fff", letterSpacing: "1px" }}>P{i+1}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 17, color: "#14161c" }}>{c.name}</div>
              <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "#4f5764", marginTop: 2 }}>STR {c.strength} · CRAFT {c.craft} · LIVES {c.lives}</div>
            </div>
          </div>
        ))}
      </div>
    </ToolCard>
  );
}

// Hex board generator — visually show 4-ring layout
function HexBoardGenerator() {
  const [seed, setSeed] = React.useState(Math.floor(Math.random()*1000));
  function reshuffle() { setSeed(Math.floor(Math.random()*1000)); }
  // Build a 4-ring hex map abstractly — 1 centre + 6 inner + 12 middle + 18 outer = 37 tiles (simplified from 61 for visual clarity)
  const tiles = React.useMemo(() => {
    const rings = [
      { count: 1,  color: "#d11a1a", radius: 0 },   // crown
      { count: 6,  color: "#5d2a8a", radius: 60 },  // inner
      { count: 12, color: "#0c4f8d", radius: 120 }, // middle
      { count: 18, color: "#3a9928", radius: 180 }, // outer
    ];
    const out = [];
    rings.forEach((r, ringIdx) => {
      for (let i = 0; i < r.count; i++) {
        const a = (i / r.count) * Math.PI * 2 - Math.PI/2;
        out.push({
          x: Math.cos(a) * r.radius,
          y: Math.sin(a) * r.radius,
          color: r.color,
          ringIdx,
          // Pseudo-random tile type based on seed + index
          type: ((seed * 7 + ringIdx * 13 + i) % 5),
        });
      }
    });
    return out;
  }, [seed]);
  return (
    <ToolCard accent="#0c4f8d" eyebrow="▲ TALISMAN: HEXED" title="Hex board generator" desc="A fresh 4-ring tile layout. Click reshuffle for a new arrangement of the 37-tile Hexed map.">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "#7a8290" }}>
          seed: {seed.toString().padStart(4, "0")}
        </div>
        <Btn variant="dark" onClick={reshuffle}>
          <img src="../../../assets/icons/roll.svg" width="16" height="16" alt="" style={{ filter: "invert(1)" }} />
          Reshuffle
        </Btn>
      </div>
      <div style={{ background: "#0a0d2a", borderRadius: 14, padding: 20, position: "relative", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", minHeight: 420 }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle, rgba(58,123,232,0.18) 0%, transparent 65%)" }} />
        <svg width="440" height="440" viewBox="-220 -220 440 440" style={{ position: "relative" }}>
          {tiles.map((t, i) => (
            <g key={i} transform={`translate(${t.x}, ${t.y})`}>
              <polygon
                points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7"
                fill={t.color}
                stroke="rgba(255,255,255,0.3)"
                strokeWidth="0.8"
                opacity={0.85 + t.type * 0.03}
              />
              <text x="0" y="3" fontFamily="var(--mg-font-mono)" fontSize="7" fill="rgba(255,255,255,0.6)" textAnchor="middle">{t.type + 1}</text>
            </g>
          ))}
        </svg>
      </div>
      <div style={{ display: "flex", gap: 14, fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "#4f5764", marginTop: 12, flexWrap: "wrap" }}>
        <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#d11a1a", borderRadius: 2, verticalAlign: "middle", marginRight: 6 }} />Crown of Command</span>
        <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#5d2a8a", borderRadius: 2, verticalAlign: "middle", marginRight: 6 }} />Inner ring</span>
        <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#0c4f8d", borderRadius: 2, verticalAlign: "middle", marginRight: 6 }} />Middle ring</span>
        <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#3a9928", borderRadius: 2, verticalAlign: "middle", marginRight: 6 }} />Outer ring</span>
      </div>
    </ToolCard>
  );
}

// Encounter quick-draw
const ENCOUNTERS = [
  { ring: "outer",  text: "Goblin (Strength 3) attacks. Roll on the Strength encounter table." },
  { ring: "outer",  text: "You meet a Stranger. Roll 1d6 and consult the Stranger deck." },
  { ring: "outer",  text: "Find a Talisman (only one per game)." },
  { ring: "middle", text: "Highland Ogre (Strength 5). Single combat, no escape." },
  { ring: "middle", text: "Spell Trader. Discard 1 spell, draw 2." },
  { ring: "middle", text: "Standing Stones — gain 1 Craft, lose 1 Life." },
  { ring: "inner",  text: "Werewolf (Strength 6, Craft 4). Choose your contest." },
  { ring: "inner",  text: "Imp — steals one object of its choice. Roll again." },
  { ring: "inner",  text: "Cursed Glade. Lose half your gold (rounded down)." },
];

function EncounterQuickDraw() {
  const [ring, setRing] = React.useState("outer");
  const [enc, setEnc] = React.useState(ENCOUNTERS[0]);
  function draw() {
    const pool = ENCOUNTERS.filter(e => e.ring === ring);
    setEnc(pool[Math.floor(Math.random() * pool.length)]);
  }
  return (
    <ToolCard accent="#d11a1a" eyebrow="▲ TALISMAN: HEXED" title="Encounter quick-draw" desc="When the rulebook is in the other room — draw a quick encounter for the ring you're on.">
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {["outer", "middle", "inner"].map(r => (
          <button key={r} onClick={() => setRing(r)} style={{
            flex: 1, height: 44, fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 13,
            background: ring === r ? "#14161c" : "#f5f4ef",
            color: ring === r ? "#fff" : "#14161c",
            border: `1px solid ${ring === r ? "#14161c" : "#e6e3d8"}`,
            borderRadius: 9999, cursor: "pointer",
            textTransform: "uppercase", letterSpacing: "0.5px",
          }}>{r} ring</button>
        ))}
      </div>
      <div style={{ background: "#0a0d2a", padding: 28, borderRadius: 14, position: "relative", overflow: "hidden", minHeight: 140 }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 0% 0%, rgba(209,26,26,0.2) 0%, transparent 60%)" }} />
        <div style={{ position: "relative" }}>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#6fb5ff", letterSpacing: "1.5px", marginBottom: 14 }}>▲ {ring.toUpperCase()} RING · ENCOUNTER</div>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 19, lineHeight: 1.5, color: "#fff", margin: 0 }}>{enc.text}</p>
        </div>
      </div>
      <div style={{ marginTop: 14, display: "flex", justifyContent: "flex-end" }}>
        <Btn variant="dark" onClick={draw}>Draw another</Btn>
      </div>
    </ToolCard>
  );
}

function App() {
  return (
    <div data-screen-label="Talisman Tools">
      <NavBar />
      <section style={{ background: "#000", color: "#fff", padding: "56px 32px 80px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", right: -100, top: "20%", width: 600, height: 600, background: "radial-gradient(circle, rgba(93,42,138,0.32) 0%, transparent 65%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 960, margin: "0 auto", position: "relative" }}>
          <a href="../index.html" style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "rgba(255,255,255,0.7)", textDecoration: "none" }}>← All tools</a>
          <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 10, color: "#c97afb", letterSpacing: "1.5px", marginTop: 22, marginBottom: 16, textShadow: "0 0 14px rgba(93,42,138,0.6)" }}>▲ TALISMAN TOOLS</div>
          <h1 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: "clamp(48px, 6vw, 84px)", lineHeight: 1.0, letterSpacing: "-0.025em", margin: 0 }}>
            Tools for the <em style={{ color: "#c97afb" }}>Hexed</em> table.
          </h1>
          <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 17, color: "rgba(255,255,255,0.78)", margin: "18px 0 0", maxWidth: 580, lineHeight: 1.55 }}>
            Built for Talisman 4e (revised) + Talisman: Hexed.
            Use these when the rulebook is across the room.
          </p>
        </div>
      </section>
      <section style={{ background: "#f5f4ef", padding: "56px 32px 96px" }}>
        <div style={{ maxWidth: 760, margin: "0 auto" }}>
          <CharacterLottery />
          <HexBoardGenerator />
          <EncounterQuickDraw />
        </div>
      </section>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
