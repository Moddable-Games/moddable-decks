<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mod — Moddable.Games</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/png" href="../../assets/moddable-logo.png">
<style>
  html, body { margin: 0; padding: 0; background: #000; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  em { font-style: italic; }
  button:focus-visible, a:focus-visible { outline: 2px solid #6fb5ff; outline-offset: 3px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../marketing/Buttons.jsx"></script>
<script type="text/babel" src="../marketing/NavBar.jsx"></script>
<script type="text/babel" src="../marketing/ModCard.jsx"></script>
<script type="text/babel" src="../marketing/Footer.jsx"></script>
<script type="text/babel" src="../marketing/registry.jsx"></script>

<script type="text/babel">

// Generic mod-detail page driven by ?slug= query param.
// For the full Talisman:Hexed page, see ../mod-detail/index.html.

const CATEGORY_COLOR = {
  "Total conversion": "#d11a1a",
  "Rebalance":        "#3a9928",
  "Reskin":           "#0c4f8d",
};

function App() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("slug") || "econopoly";
  const mod = MODS.find(m => m.slug === slug) || MODS[0];
  const accent = CATEGORY_COLOR[mod.category] || "#0c4f8d";

  // 3 related mods (same base game first, else any others)
  const related = [
    ...MODS.filter(m => m.slug !== mod.slug && m.baseGame === mod.baseGame),
    ...MODS.filter(m => m.slug !== mod.slug && m.baseGame !== mod.baseGame),
  ].slice(0, 3);

  return (
    <div data-screen-label={`Mod · ${mod.slug}`}>
      <NavBar />

      {/* Header */}
      <section style={{ position: "relative", color: "#fff", overflow: "hidden", background: "#000" }}>
        <div style={{ position: "absolute", right: -150, top: "30%", width: 700, height: 700, background: `radial-gradient(circle, ${accent}55 0%, transparent 60%)`, pointerEvents: "none" }} />
        <div style={{ position: "relative", padding: "56px 32px 88px", maxWidth: 1200, margin: "0 auto" }}>
          <a href="../mods/index.html" style={{ fontFamily: "var(--mg-font-mono)", fontSize: 12, color: "rgba(255,255,255,0.7)", textDecoration: "none" }}>← All mods</a>

          <div style={{ display: "flex", gap: 10, marginTop: 24, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontFamily: "var(--mg-font-body)", fontWeight: 600, fontSize: 11, background: accent, color: "#fff", padding: "4px 10px", borderRadius: 9999, letterSpacing: "0.3px" }}>{mod.category}</span>
            <span style={{ fontFamily: "var(--mg-font-mono)", fontSize: 11, color: "rgba(255,255,255,0.7)", padding: "4px 10px", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 9999 }}>base: {mod.baseGame}</span>
            {!mod.real && (
              <span style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 9, color: "#e89a1a", padding: "5px 10px", letterSpacing: "1px" }}>⚠ PLACEHOLDER COPY</span>
            )}
          </div>

          <h1 style={{
            fontFamily: "var(--mg-font-display)",
            fontWeight: 600,
            fontSize: "clamp(40px, 6.5vw, 88px)",
            lineHeight: 1.0,
            letterSpacing: "-0.025em",
            margin: "20px 0 24px",
            maxWidth: 1000,
          }} dangerouslySetInnerHTML={{ __html: mod.title }} />

          <p style={{
            fontFamily: "var(--mg-font-body)",
            fontSize: 19,
            lineHeight: 1.55,
            color: "rgba(255,255,255,0.78)",
            maxWidth: 720,
            margin: "0 0 36px",
          }}>{mod.body}</p>

          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 40 }}>
            <Btn variant="primary">
              <img src="../../assets/icons/download.svg" width="18" height="18" alt="" style={{ filter: "invert(1)" }} />
              Download rules
            </Btn>
            <Btn variant="outline-dark">Print-and-play pack</Btn>
          </div>

          <div style={{
            fontFamily: "var(--mg-font-mono)", fontSize: 13, color: "rgba(255,255,255,0.7)",
            paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.12)",
          }}>{mod.stats}</div>
        </div>
      </section>

      {/* Stub body */}
      <section style={{ background: "#f5f4ef", padding: "72px 32px 88px" }}>
        <div style={{ maxWidth: 760, margin: "0 auto" }}>
          <div style={{ background: "#fff", border: `2px dashed ${accent}`, borderRadius: 20, padding: 48, textAlign: "center" }}>
            <div style={{ fontFamily: "var(--mg-font-pixel)", fontSize: 11, color: accent, letterSpacing: "1.5px", marginBottom: 14 }}>▲ STUB PAGE</div>
            <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 32, lineHeight: 1.15, letterSpacing: "-0.4px", color: "#14161c", margin: "0 0 12px" }}>
              Full rulebook coming.
            </h2>
            <p style={{ fontFamily: "var(--mg-font-body)", fontSize: 16, lineHeight: 1.6, color: "#3a3d44", margin: "0 0 24px", maxWidth: 540, marginInline: "auto" }}>
              This is a stub detail page. The full template (with rules sections, components list, and sticky anchor sidebar) is implemented on the <a href="../mod-detail/index.html" style={{ color: accent, textDecoration: "underline" }}>Talisman: Hexed</a> page — Claude Code can scaffold the rest from that template + this mod's entry in <code>ui_kits/marketing/registry.jsx</code>.
            </p>
            <Btn variant="dark" onClick={() => location.href = "../mod-detail/index.html"}>See the full template</Btn>
          </div>
        </div>
      </section>

      {/* Related */}
      {related.length > 0 && (
        <section style={{ background: "#fff", padding: "88px 32px", borderTop: "1px solid #e6e3d8" }}>
          <div style={{ maxWidth: 1200, margin: "0 auto" }}>
            <h2 style={{ fontFamily: "var(--mg-font-display)", fontWeight: 600, fontSize: 36, lineHeight: 1.15, letterSpacing: "-0.5px", color: "#14161c", margin: "0 0 32px" }}>
              More from the library.
            </h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 20 }}>
              {related.map(m => <ModCard key={m.slug} {...m} />)}
            </div>
          </div>
        </section>
      )}

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
