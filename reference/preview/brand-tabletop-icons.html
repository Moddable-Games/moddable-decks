<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; }
  
</style>
</head>
<body>

<div class="card">
  <div class="tag" style="margin-bottom: 12px;">Tabletop icon family — 24×24 · 2px stroke · matches Lucide</div>
  <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px 10px; color: #14161c; align-items: end;">
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <img src="../assets/icons/d6.svg" width="26" height="26" alt="d6">
        <span style="font-family: var(--mg-font-mono); font-size:10px; color:#7a8290;">d6</span>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <img src="../assets/icons/d20.svg" width="26" height="26" alt="d20">
        <span style="font-family: var(--mg-font-mono); font-size:10px; color:#7a8290;">d20</span>

        <span style="font-family: var(--mg-font-mono); font-size:10px; color:#7a8290;">d12</span>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <img src="../assets/icons/d4.svg" width="26" height="26" alt="d4">
        <span style="font-family: var(--mg-font-mono); font-size:10px; color:#7a8290;">d4</span>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">

      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
