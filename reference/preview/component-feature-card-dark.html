<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card" style="background:#000;">
  <div style="background:#161721; border-radius:20px; padding:28px;">
    <div style="font-family: var(--mg-font-pixel); font-size:9px; color:#6fb5ff; letter-spacing:1px; margin-bottom:14px;">▲ FEATURED</div>
    <div style="font-family: var(--mg-font-display); font-weight:600; font-size:28px; color:#fff; line-height:1.15; letter-spacing:-0.4px;">Hyper Imperium</div>
    <div style="font-family: var(--mg-font-body); font-size:15px; color:rgba(255,255,255,.72); margin-top:8px;">A speed-running ruleset for <em>Twilight Imperium</em>. 4 hours, not 14.</div>
    <div class="mg-mono-sm" style="color: var(--mg-cosmic-glow); margin-top:10px;">3–6 players · 240 min · 14+</div>
  </div>
</div>
</body></html>
