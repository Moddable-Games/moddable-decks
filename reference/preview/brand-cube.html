<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card" style="background: #000; padding: 28px;">
  <div class="tag" style="color: rgba(255,255,255,0.4); margin-bottom: 12px;">The mark — 3D RGB hexagonal cube</div>
  <div style="display: flex; gap: 18px; align-items: center;">
    <!-- Reconstructed cube glyph -->
    <svg width="100" height="110" viewBox="0 0 100 110">
      <!-- top: red -->
      <polygon points="50,5 92,30 50,55 8,30" fill="#d11a1a" stroke="#000" stroke-width="2.5"/>
      <!-- left: green -->
      <polygon points="8,30 50,55 50,105 8,80" fill="#3a9928" stroke="#000" stroke-width="2.5"/>
      <!-- right: blue -->
      <polygon points="92,30 50,55 50,105 92,80" fill="#0c4f8d" stroke="#000" stroke-width="2.5"/>
    </svg>
    <div>
      <div class="lbl" style="color:#fff; margin-bottom: 8px;">Brand mark composition</div>
      <div class="meta" style="color: rgba(255,255,255,0.6); line-height:1.6;">Top &nbsp;→ <span style="color:#e63232;">Mod Red #d11a1a</span><br>Left → <span style="color:#4eb735;">Mod Green #3a9928</span><br>Right → <span style="color:#6fb5ff;">Mod Blue #0c4f8d</span><br><br>Never recolour. Never rotate. Never flatten.</div>
    </div>
  </div>
</div>
</body></html>
