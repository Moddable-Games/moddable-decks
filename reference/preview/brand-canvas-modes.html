<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card" style="padding: 0;">
  <div style="display:grid; grid-template-columns: 1fr 1fr; height: 200px;">
    <div style="background: linear-gradient(180deg, #0a0d2a, #000); padding: 22px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden;">
      <div style="position:absolute; inset:0; background-image: url('data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;28&quot; height=&quot;32&quot; viewBox=&quot;0 0 56 64&quot;><path d=&quot;M28 1 54 16v32L28 63 2 48V16z&quot; fill=&quot;none&quot; stroke=&quot;%236fb5ff&quot; stroke-opacity=&quot;0.25&quot; stroke-width=&quot;1&quot;/></svg>'); background-size:28px 32px;"></div>
      <span class="tag" style="color: rgba(255,255,255,0.5); position:relative;">storytelling · cosmic + hex</span>
      <div style="position:relative;">
        <div style="font-family: var(--mg-font-pixel); font-size:11px; color:#6fb5ff; letter-spacing:1px; margin-bottom:6px;">▲ MODDABLE</div>
        <div style="font-family: var(--mg-font-display); font-weight: 600; font-size: 28px; color:#fff; line-height:1.05; letter-spacing:-0.4px;">Nuke Catan.</div>
      </div>
    </div>
    <div style="background:#f5f4ef; padding: 22px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="tag">catalogue · warm-ivory</span>
      <div>
        <div style="font-family: var(--mg-font-display); font-weight:600; font-size: 22px; color:#14161c;">Browse 12 mods</div>
        <div class="mg-mono-sm" style="color:#4f5764; margin-top:4px;">3 reskins · 4 rebalances · 5 conversions</div>
      </div>
    </div>
  </div>
</div>
</body></html>
