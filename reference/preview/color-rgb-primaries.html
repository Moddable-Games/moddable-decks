<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card col" style="gap: 12px;">
  <div class="tag" style="margin-bottom: 4px;">RGB cube — one per surface, never combined</div>
  <div class="row">
    <div class="swatch" style="background:#d11a1a;"></div>
    <div class="col" style="gap:2px;"><span class="lbl">Mod Red</span><span class="meta">--mg-red · #d11a1a · destructive · featured · "Nuke"</span></div>
  </div>
  <div class="row">
    <div class="swatch" style="background:#3a9928;"></div>
    <div class="col" style="gap:2px;"><span class="lbl">Mod Green</span><span class="meta">--mg-green · #3a9928 · go · new · ready</span></div>
  </div>
  <div class="row">
    <div class="swatch" style="background:#0c4f8d;"></div>
    <div class="col" style="gap:2px;"><span class="lbl">Mod Blue</span><span class="meta">--mg-blue · #0c4f8d · primary brand accent</span></div>
  </div>
</div>
</body></html>
