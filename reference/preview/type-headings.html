<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card col" style="gap: 12px;">
  <div><div class="mg-heading-lg">Browse 12 mods</div><div class="meta">Inter Tight 600 · 32 · <span class="tag" style="margin-left:6px;">heading-lg</span></div></div>
  <div><div class="mg-heading-md">Reskin · Rebalance · Total Conversion</div><div class="meta">Inter Tight 600 · 24 · <span class="tag" style="margin-left:6px;">heading-md</span></div></div>
  <div><div class="mg-heading-sm">Last updated by ascelot</div><div class="meta">Inter Tight 600 · 20 · <span class="tag" style="margin-left:6px;">heading-sm</span></div></div>
</div>
</body></html>
