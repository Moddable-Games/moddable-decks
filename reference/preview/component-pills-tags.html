<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card">
  <div class="tag" style="margin-bottom: 12px;">Pill chips · category stripes · badges</div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <span style="font-family: var(--mg-font-body); font-weight:600; font-size:13px; background:#f5f4ef; color:#14161c; padding:7px 14px; border-radius:9999px;">Mods</span>
    <span style="font-family: var(--mg-font-body); font-weight:600; font-size:13px; background:#000; color:#fff; padding:7px 14px; border-radius:9999px;">Games</span>
    <span style="font-family: var(--mg-font-body); font-weight:600; font-size:13px; background:#f5f4ef; color:#14161c; padding:7px 14px; border-radius:9999px;">Tools</span>
    <span style="font-family: var(--mg-font-body); font-weight:600; font-size:13px; background:#f5f4ef; color:#14161c; padding:7px 14px; border-radius:9999px;">News</span>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top: 12px;">
    <span style="font-family: var(--mg-font-body); font-weight:600; font-size:11px; background:#d11a1a; color:#fff; padding:4px 10px; border-radius:9999px;">Total conversion</span>
    <span style="font-family: var(--mg-font-body); font-weight:600; font-size:11px; background:#3a9928; color:#fff; padding:4px 10px; border-radius:9999px;">Rebalance</span>
    <span style="font-family: var(--mg-font-body); font-weight:600; font-size:11px; background:#0c4f8d; color:#fff; padding:4px 10px; border-radius:9999px;">Reskin</span>
    <span style="font-family: var(--mg-font-pixel); font-size:9px; background:#000; color:#fff; padding:5px 10px; border-radius:6px; letter-spacing:1px;">NEW</span>
  </div>
  <div class="meta" style="margin-top: 12px;">nav pills · category badges (RGB) · pixel "NEW" stamp</div>
</div>
</body></html>
