<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px;">
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#14161c; "></div><div class="col" style="gap:1px;"><span class="lbl">Ink</span><span class="meta">#14161c</span></div></div>
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#1f2228; "></div><div class="col" style="gap:1px;"><span class="lbl">Body</span><span class="meta">#1f2228</span></div></div>
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#3a3d44; "></div><div class="col" style="gap:1px;"><span class="lbl">Charcoal</span><span class="meta">#3a3d44</span></div></div>
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#4f5764; "></div><div class="col" style="gap:1px;"><span class="lbl">Mute</span><span class="meta">#4f5764</span></div></div>
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#7a8290; "></div><div class="col" style="gap:1px;"><span class="lbl">Stone</span><span class="meta">#7a8290</span></div></div>
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#c3c5cc; "></div><div class="col" style="gap:1px;"><span class="lbl">Faint</span><span class="meta">#c3c5cc</span></div></div>
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#e6e3d8; "></div><div class="col" style="gap:1px;"><span class="lbl">Hairline</span><span class="meta">#e6e3d8</span></div></div>
    
      <div class="row"><div style="width:44px; height:30px; border-radius:6px; background:#ffffff; border:1px solid var(--mg-hairline-light);"></div><div class="col" style="gap:1px;"><span class="lbl">On-Dark</span><span class="meta">#ffffff</span></div></div>
    
  </div>
</div>
</body></html>
