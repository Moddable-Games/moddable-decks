<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--mg-font-body); color: var(--mg-ink); }
  * { box-sizing: border-box; }
  .card { padding: 22px 26px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .swatch { width: 88px; height: 56px; border-radius: 10px; flex: none; }
  .lbl { font-family: var(--mg-font-body); font-weight: 600; font-size: 13px; color: var(--mg-ink); letter-spacing: 0.1px; }
  .meta { font-family: var(--mg-font-mono); font-size: 11px; color: var(--mg-mute); }
  .tag { font-family: var(--mg-font-pixel); font-size: 9px; color: var(--mg-stone); letter-spacing: 0.5px; text-transform: uppercase; }
  
</style>
</head>
<body>

<div class="card">
  <div class="tag" style="margin-bottom: 10px;">Cosmic palette — for hero gradients only</div>
  <div style="height: 96px; border-radius: 12px; background: linear-gradient(180deg, #0a0d2a 0%, #1a3680 50%, #3a7be8 80%, #000 100%); position: relative; overflow: hidden;">
    <div style="position:absolute; inset:0; background-image: url('data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;56&quot; height=&quot;64&quot; viewBox=&quot;0 0 56 64&quot;><path d=&quot;M28 1 54 16v32L28 63 2 48V16z&quot; fill=&quot;none&quot; stroke=&quot;%236fb5ff&quot; stroke-opacity=&quot;0.3&quot; stroke-width=&quot;1&quot;/></svg>'); background-size: 56px 64px; opacity: 0.7;"></div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px;">
    <div class="col" style="gap:2px;"><div style="height:24px; background:#0a0d2a; border-radius:4px;"></div><span class="meta">cosmic-deep<br>#0a0d2a</span></div>
    <div class="col" style="gap:2px;"><div style="height:24px; background:#1a3680; border-radius:4px;"></div><span class="meta">cosmic-mid<br>#1a3680</span></div>
    <div class="col" style="gap:2px;"><div style="height:24px; background:#3a7be8; border-radius:4px;"></div><span class="meta">cosmic-bright<br>#3a7be8</span></div>
    <div class="col" style="gap:2px;"><div style="height:24px; background:#6fb5ff; border-radius:4px;"></div><span class="meta">cosmic-glow<br>#6fb5ff</span></div>
  </div>
</div>
</body></html>
